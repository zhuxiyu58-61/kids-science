<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>知识乐园 · 寻宝探险地图</title>
<style>
  :root{ --ink:#4a3418; --ink2:#8a7a5c; --gold:#f5b731; --trail:#c79a5f; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{margin:0;}
  body{ font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif; color:#4a3418;
    background:
      radial-gradient(120% 60% at 10% 0%, #fff7e2 0%, rgba(255,247,226,0) 60%),
      radial-gradient(120% 60% at 90% 20%, #ffeecb 0%, rgba(255,238,203,0) 55%),
      radial-gradient(140% 70% at 50% 100%, #d8f0e6 0%, rgba(216,240,230,0) 55%),
      linear-gradient(180deg,#fbeecb 0%, #f6e4bf 55%, #efdcae 100%);
    touch-action:manipulation; overflow-x:hidden;}

  header{text-align:center; padding:20px 16px 6px;}
  header h1{font-size:clamp(24px,5.5vw,38px); margin:0; font-weight:900; letter-spacing:2px;
    color:#7a4d17; text-shadow:0 2px 0 #fff3d6, 0 4px 10px rgba(150,100,30,.2);}
  header p{color:#a07c3e; font-weight:800; margin:5px 0 0; font-size:14px;}

  .hud{max-width:640px; margin:12px auto 4px; display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap;}
  .chip{background:#fff; color:#b6842b; font-weight:900; font-size:14px; padding:8px 15px; border-radius:16px;
    box-shadow:0 5px 14px rgba(150,100,30,.18); display:flex; align-items:center; gap:6px;}
  .chip b{color:#e07d1a;}
  .chip.green b{color:#2fa869;}
  .goBtn{background:linear-gradient(135deg,#ff9f43,#ff6a3d); color:#fff; border:none; font-weight:900;
    font-size:16px; padding:13px 24px; border-radius:20px; box-shadow:0 8px 20px rgba(230,110,40,.35);
    cursor:pointer; letter-spacing:1px; transition:transform .1s;}
  .goBtn:active{transform:scale(.95);}

  /* 地图画布 */
  #map{position:relative; width:100%; max-width:720px; margin:6px auto 0;}
  #trail{position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:1;}

  .node{position:absolute; transform:translate(-50%,-50%); z-index:2; text-align:center; cursor:pointer;}
  .node .disc{width:var(--d,84px); height:var(--d,84px); border-radius:50%; margin:0 auto;
    display:flex; align-items:center; justify-content:center; font-size:calc(var(--d,84px)*.46);
    background:#fff; box-shadow:0 8px 18px rgba(120,80,20,.25), inset 0 0 0 5px var(--rc,#5bc0ff);
    position:relative; transition:transform .12s;}
  .node:active .disc{transform:scale(.92);}
  .node .nm{margin-top:6px; font-weight:900; font-size:13px; color:#5a4118; line-height:1.25;
    max-width:120px; text-shadow:0 1px 0 #fff8e6;}
  .node .nsub{font-size:12px; color:#a07c3e; font-weight:700;}

  /* 完成态：金环 + 对勾 */
  .node.done .disc{box-shadow:0 8px 20px rgba(230,170,30,.5), inset 0 0 0 5px var(--gold);
    background:radial-gradient(circle at 50% 35%, #fffbe9, #ffedb8);}
  .node.done .disc::after{content:'✓'; position:absolute; right:-4px; bottom:-4px; width:26px; height:26px;
    background:#41c98a; color:#fff; border-radius:50%; font-size:15px; font-weight:900;
    display:flex; align-items:center; justify-content:center; box-shadow:0 3px 8px rgba(40,150,90,.4); border:2px solid #fff;}

  /* 当前位置 */
  .node.here .disc{animation:hb 1.3s ease-in-out infinite; box-shadow:0 0 0 6px rgba(255,159,67,.35), 0 8px 20px rgba(230,110,40,.4), inset 0 0 0 5px #ff8a3d;}
  @keyframes hb{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .hereFlag{position:absolute; top:-34px; left:50%; transform:translateX(-50%); white-space:nowrap;
    background:#ff6a3d; color:#fff; font-weight:900; font-size:12px; padding:5px 11px; border-radius:12px;
    box-shadow:0 5px 12px rgba(230,80,40,.4);}
  .hereFlag::after{content:''; position:absolute; bottom:-6px; left:50%; transform:translateX(-50%);
    border:6px solid transparent; border-top-color:#ff6a3d; border-bottom:0;}

  /* 宝箱 / 起点 / 终点 */
  .node.big .disc{--d2:96px; width:96px; height:96px; font-size:46px;}
  .node.chest .disc{background:radial-gradient(circle at 50% 35%,#fff3cf,#ffe0a0); box-shadow:0 8px 20px rgba(180,120,30,.35), inset 0 0 0 5px #e0a94b;}
  .node.chest.open .disc{background:radial-gradient(circle at 50% 35%,#fffbe9,#ffe89a); box-shadow:0 0 22px rgba(245,183,49,.7), inset 0 0 0 5px var(--gold);}
  .node.locked .disc{filter:grayscale(.5); opacity:.85;}

  /* 区域缎带 */
  .ribbon{position:absolute; transform:translate(-50%,-50%); z-index:2;
    background:var(--rc,#5bc0ff); color:#fff; font-weight:900; font-size:14px; padding:7px 16px 7px 14px;
    border-radius:0 16px 16px 0; box-shadow:0 6px 14px rgba(80,60,20,.25); white-space:nowrap;}
  .ribbon small{display:block; font-size:10px; opacity:.9; font-weight:800;}

  /* 战利品架 */
  .shelf{max-width:720px; margin:26px auto 10px; background:#fff; border-radius:22px; padding:16px 18px;
    box-shadow:0 10px 26px rgba(150,100,30,.16);}
  .shelf h3{margin:0 0 12px; font-size:16px; font-weight:900; color:#7a4d17; display:flex; align-items:center; gap:7px;}
  .shelf-grid{display:flex; gap:10px; flex-wrap:wrap;}
  .medal{width:70px; text-align:center;}
  .medal .m{width:56px; height:56px; border-radius:50%; margin:0 auto; display:flex; align-items:center; justify-content:center; font-size:28px;
    background:linear-gradient(160deg,#fff6df,#ffe09f); box-shadow:inset 0 0 0 3px #ffcf6b, 0 5px 12px rgba(240,180,60,.3);}
  .medal.locked .m{background:#f0ece2; box-shadow:none; filter:grayscale(1); opacity:.45;}
  .medal .mn{font-size:12px; font-weight:800; margin-top:4px; line-height:1.3; color:#6a5327;}
  .medal.locked .mn{color:#b3a789;}
  /* 战利品架：150 个全平铺会刷屏，改成「最新 + 按区折叠」 */
  .shelfCount{margin-left:auto; background:#fff3d9; color:#c9781f; font-size:13px; font-weight:900; padding:4px 11px; border-radius:12px;}
  .shSub{font-size:12.5px; font-weight:900; color:#a07c3e; margin:2px 0 8px;}
  .shNew{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:6px;}
  .shEmpty{color:#a07c3e; font-weight:700; font-size:13.5px; text-align:center; padding:12px 0 16px; line-height:1.6;}
  .shDiv{height:1px; background:#f0e7d5; margin:12px 0 12px;}
  .shRow{display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:16px;
    background:#fff8ec; margin-bottom:8px; cursor:pointer; transition:transform .1s;}
  .shRow:active{transform:scale(.99);}
  .shRow.full{background:linear-gradient(135deg,#fff6df,#ffe9b8);}
  .shRow .sIco{width:38px; height:38px; border-radius:50%; background:#fff; flex:none;
    display:flex; align-items:center; justify-content:center; font-size:21px; box-shadow:0 3px 8px rgba(150,100,30,.15);}
  .shRow .sB{flex:1; min-width:0;}
  .shRow .sN{font-weight:900; font-size:14px; color:#5a4118;}
  .shRow .sBar{height:7px; border-radius:4px; background:#ece2cd; margin-top:5px; overflow:hidden;}
  .shRow .sBar i{display:block; height:100%; border-radius:4px; background:linear-gradient(90deg,#ffc65c,#ff9f43);}
  .shRow.full .sBar i{background:linear-gradient(90deg,#ffd36b,#f5b731);}
  .shRow .sNum{font-weight:900; font-size:13px; color:#b6842b; flex:none;}
  .shRow .sAr{color:#c9b48a; font-weight:900; font-size:13px; flex:none; transition:transform .2s;}
  .shRow.open .sAr{transform:rotate(90deg);}
  .shGrid{display:none; flex-wrap:wrap; gap:10px; padding:2px 4px 14px;}
  .shGrid.open{display:flex;}

  footer{max-width:720px; margin:18px auto 40px; text-align:center; color:#a07c3e; font-size:13px; font-weight:700;}

  /* 今日推荐 */
  .today{max-width:560px; margin:10px auto 2px; background:linear-gradient(135deg,#ffb347,#ff7a3d);
    border-radius:22px; padding:14px 18px; color:#fff; box-shadow:0 10px 24px rgba(230,120,40,.35);
    display:flex; align-items:center; gap:14px; cursor:pointer; transition:transform .12s;}
  .today:active{transform:scale(.98);}
  .today .te{font-size:44px; filter:drop-shadow(0 3px 4px rgba(0,0,0,.15));}
  .today .tb{flex:1;}
  .today .tk{font-size:12px; font-weight:900; opacity:.92; letter-spacing:1px;}
  .today .tt{font-size:20px; font-weight:900; margin:2px 0;}
  .today .td{font-size:12.5px; opacity:.92; font-weight:700;}
  .today .tgo{background:#fff; color:#e0692c; font-weight:900; padding:10px 16px; border-radius:14px; font-size:15px; white-space:nowrap;}

  /* 宝箱彩蛋弹层 */
  .reward{position:fixed; inset:0; z-index:80; display:none; align-items:center; justify-content:center;
    background:rgba(40,25,5,.5); backdrop-filter:blur(2px);}
  .reward.on{display:flex;}
  .reward .rcard{background:linear-gradient(180deg,#fffdf5,#fff2d6); border-radius:26px; padding:26px 30px 24px;
    box-shadow:0 20px 50px rgba(120,80,20,.4); text-align:center; max-width:340px; animation:rpop .4s ease;}
  @keyframes rpop{0%{transform:scale(.6); opacity:0}100%{transform:scale(1); opacity:1}}
  .reward .rchest{font-size:64px; animation:rshake .5s ease;}
  @keyframes rshake{0%,100%{transform:rotate(0)}25%{transform:rotate(-10deg)}75%{transform:rotate(10deg)}}
  .reward .rgift{font-size:80px; margin:2px 0; animation:gpop .6s ease .15s both;}
  @keyframes gpop{0%{transform:scale(0) translateY(20px)}70%{transform:scale(1.25)}100%{transform:scale(1) translateY(0)}}
  .reward h3{margin:6px 0 2px; font-size:22px; font-weight:900; color:#7a4d17;}
  .reward .rname{display:inline-block; background:linear-gradient(160deg,#ffd36b,#ff9f43); color:#fff; font-weight:900; font-size:16px; padding:6px 16px; border-radius:14px; margin:6px 0 10px;}
  .reward p{color:#a07c3e; font-weight:700; font-size:13.5px; margin:0 0 16px; line-height:1.6;}
  .reward button{border:none; border-radius:16px; padding:12px 26px; font-size:16px; font-weight:900; color:#fff; background:linear-gradient(135deg,#ff9f43,#ff6a3d); cursor:pointer;}

  /* ===== 日历弹层 ===== */
  .cal{position:fixed; inset:0; z-index:90; display:none; flex-direction:column;
    background:linear-gradient(180deg,#fff7e6 0%, #fdeccb 100%);}
  .cal.on{display:flex;}
  .cal-top{display:flex; align-items:center; gap:10px; padding:16px 16px 6px;}
  .cal-top h2{margin:0; font-size:20px; font-weight:900; color:#7a4d17;}
  .cal-close{margin-left:auto; background:#fff; border:none; border-radius:14px; padding:9px 15px;
    font-weight:900; font-size:15px; color:#7a4d17; box-shadow:0 4px 10px rgba(150,100,30,.18); cursor:pointer;}
  .cal-today{margin:2px 16px 8px; background:linear-gradient(135deg,#ffb347,#ff7a3d); border-radius:20px;
    padding:12px 16px; color:#fff; display:flex; align-items:center; gap:12px; box-shadow:0 8px 20px rgba(230,120,40,.32); cursor:pointer;}
  .cal-today .cte{font-size:40px; filter:drop-shadow(0 3px 4px rgba(0,0,0,.15));}
  .cal-today .ctb{flex:1; min-width:0;}
  .cal-today .ctk{font-size:12px; font-weight:900; opacity:.92; letter-spacing:1px;}
  .cal-today .ctt{font-size:19px; font-weight:900; margin:1px 0;}
  .cal-today .ctd{font-size:12px; opacity:.92; font-weight:700;}
  .cal-today .ctgo{background:#fff; color:#e0692c; font-weight:900; padding:10px 15px; border-radius:13px; font-size:15px; white-space:nowrap;}
  .cal-nav{display:flex; align-items:center; justify-content:center; gap:14px; padding:2px 16px 6px;}
  .cal-nav button{background:#fff; border:none; border-radius:12px; width:40px; height:40px; font-size:18px;
    font-weight:900; color:#7a4d17; box-shadow:0 4px 10px rgba(150,100,30,.18); cursor:pointer;}
  .cal-nav .mlabel{font-size:17px; font-weight:900; color:#7a4d17; min-width:130px; text-align:center;}
  .cal-wrap{flex:1; min-height:0; overflow-y:auto; padding:6px 12px 30px;}
  .cal-inner{max-width:560px; margin:0 auto;}
  .cal-wd{display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:6px;}
  .cal-wd div{text-align:center; font-size:12px; font-weight:800; color:#a07c3e;}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
  .cell{aspect-ratio:1/1; background:#fff; border-radius:14px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; box-shadow:0 3px 8px rgba(150,100,30,.10); position:relative; font-weight:800; overflow:hidden;}
  .cell.empty{background:transparent; box-shadow:none;}
  .cell .dnum{position:absolute; top:4px; left:6px; font-size:10px; color:#bcae90; font-weight:800;}
  .cell.done .dnum,.cell.today .dnum{color:#c79a5f;}
  .cell .cemo{font-size:24px; line-height:1;}
  .cell .ccnt{font-size:11px; color:#a07c3e; font-weight:900; margin-top:1px;}
  .cell .cchk{position:absolute; right:4px; bottom:3px; font-size:12px;}
  .cell.done{background:radial-gradient(circle at 50% 40%,#fffbe9,#ffedb8);}
  .cell.today{box-shadow:0 0 0 3px #ff8a3d, 0 6px 14px rgba(230,110,40,.35);}
  .cell.today::before{content:'今天'; position:absolute; top:-1px; right:-1px; background:#ff6a3d; color:#fff;
    font-size:9px; font-weight:900; padding:2px 5px; border-radius:0 12px 0 10px;}
  .cell.future{opacity:.55;}
  .cell.has{cursor:pointer;}
  .cell.has:active{transform:scale(.94);}
  .cal-legend{max-width:560px; margin:16px auto 0; display:flex; gap:14px; justify-content:center; flex-wrap:wrap;
    color:#a07c3e; font-size:12px; font-weight:800;}
  .cal-legend span{display:flex; align-items:center; gap:5px;}
  .cal-legend i{width:16px; height:16px; border-radius:6px; display:inline-block;}

  /* 某天课程清单 */
  .daysheet{position:fixed; inset:0; z-index:95; display:none; align-items:flex-end; justify-content:center; background:rgba(40,25,5,.45);}
  .daysheet.on{display:flex;}
  .daycard{background:#fff; border-radius:24px 24px 0 0; width:100%; max-width:560px; max-height:84vh; overflow-y:auto;
    padding:16px 16px 26px; box-shadow:0 -10px 30px rgba(120,80,20,.3); animation:slideup .28s ease;}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .daycard h3{margin:4px 0 2px; font-size:20px; font-weight:900; color:#7a4d17; text-align:center;}
  .daycard .dsub{text-align:center; color:#a07c3e; font-weight:800; font-size:13px; margin-bottom:14px;}
  .lrow{display:flex; align-items:center; gap:12px; background:#fff8ec; border-radius:16px; padding:11px 13px; margin-bottom:9px;
    box-shadow:0 3px 8px rgba(150,100,30,.1); cursor:pointer; transition:transform .1s;}
  .lrow:active{transform:scale(.98);}
  .lrow.done{background:#eefaf0;}
  .lrow .le{font-size:32px; width:40px; text-align:center; flex:none;}
  .lrow .lb{flex:1; min-width:0;}
  .lrow .ln{font-weight:900; font-size:16px; color:#5a4118;}
  .lrow .lst{font-size:12px; font-weight:800; color:#b6842b; margin-top:1px;}
  .lrow.done .lst{color:#2fa869;}
  .lrow .lgo{background:linear-gradient(135deg,#ff9f43,#ff6a3d); color:#fff; font-weight:900; padding:9px 15px; border-radius:12px; font-size:14px; white-space:nowrap; flex:none;}
  .lrow.done .lgo{background:#dff2e5; color:#2fa869;}
  .dayclose{display:block; width:100%; margin-top:8px; border:none; background:#efe7d6; color:#7a4d17; font-weight:900; padding:13px 10px; border-radius:14px; font-size:15px; cursor:pointer; white-space:nowrap;}
</style>
</head>
<body>
  <header>
    <h1>🗺️ 知识寻宝地图</h1>
    <p>从出发点选一条主题支线 · 一路探险收集宝藏徽章</p>
  </header>

  <div class="hud">
    <span class="chip">🏆 找到宝藏 <b id="cBadge">0</b>/<span id="cTotal">0</span></span>
    <span class="chip" id="chipStreak" style="background:#ffe6d6;color:#e0692c;">🔥 连续 <b style="color:#e0692c" id="cStreak">0</b> 天</span>
    <button class="goBtn" id="goBtn">继续探险 ▶</button>
  </div>

  <div class="today" id="today"></div>

  <div id="map"><svg id="trail"></svg></div>

  <div class="reward" id="reward">
    <div class="rcard">
      <div class="rchest">🎁</div>
      <div class="rgift" id="rGift">💎</div>
      <h3>宝箱开启！</h3>
      <div class="rname" id="rName">区域宝物</div>
      <p id="rDesc">你集齐了这个探险区的全部徽章，赢得了区域宝物！</p>
      <button onclick="document.getElementById('reward').classList.remove('on')">收下宝物 ✓</button>
    </div>
  </div>

  <!-- 日历弹层 -->
  <div class="cal" id="cal">
    <div class="cal-top">
      <h2>📅 我的学习日历</h2>
      <button class="cal-close" onclick="closeCal()">✕ 关闭</button>
    </div>
    <div class="cal-today" id="calToday"></div>
    <div class="cal-nav">
      <button onclick="calMove(-1)">◀</button>
      <div class="mlabel" id="calLabel"></div>
      <button onclick="calMove(1)">▶</button>
    </div>
    <div class="cal-wrap">
      <div class="cal-inner">
        <div class="cal-wd"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="cal-legend">
          <span><i style="background:radial-gradient(circle at 50% 40%,#fffbe9,#ffedb8)"></i>已完成</span>
          <span><i style="box-shadow:0 0 0 2px #ff8a3d inset;background:#fff"></i>今天要做</span>
          <span><i style="background:#fff;opacity:.55"></i>后面的课</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 某天的课程清单 -->
  <div class="daysheet" id="daysheet" onclick="if(event.target===this)closeDay()">
    <div class="daycard">
      <h3 id="dayTitle"></h3>
      <div class="dsub" id="daySub"></div>
      <div id="dayList"></div>
      <div style="display:flex; gap:10px; margin-top:8px;">
        <button class="dayclose" style="flex:1; background:#fff0d6; color:#c9781f;" onclick="calFromDay()">📅 看其它天</button>
        <button class="dayclose" style="flex:1;" onclick="closeDay()">收起</button>
      </div>
    </div>
  </div>

  <div class="shelf">
    <h3>🎖 我的战利品架 <span class="shelfCount" id="shelfCount"></span></h3>
    <div id="shelfNew"></div>
    <div class="shDiv"></div>
    <div id="shelf"></div>
  </div>

  <footer>为小探险家设计 · 每天闯一关约 15–20 分钟 · 边玩边学</footer>

<script>
/* ===== 探险路线（顺序=闯关顺序；分 5 个探险区，每区尾部一个宝箱）===== */
const REGIONS=[
  {name:'自然探索岛', ico:'🌊', color:'#2ea7ef', chest:'🐚', gift:{e:'🦪', name:'深海珍珠'},
   lessons:[
     {id:'water',    e:'💧', n:'水的三个样子', bn:'水的研究员'},
     {id:'seed',     e:'🌱', n:'种子的旅行',   bn:'小小园丁'},
     {id:'daynight', e:'🌗', n:'白天和黑夜',   bn:'昼夜小博士'},
     {id:'magnet',   e:'🧲', n:'神奇的磁铁',   bn:'磁力小侦探'},
     {id:'float',    e:'🛟', n:'浮和沉',       bn:'沉浮小实验家'},
     {id:'rainbow',  e:'🌈', n:'彩虹的秘密',   bn:'彩虹小博士'},
     {id:'force',    e:'⚖️', n:'推和拉',       bn:'力气小专家'},
     {id:'moon',     e:'🌙', n:'月亮会变身',   bn:'月亮观察员'},
     {id:'weather',  e:'🌦️', n:'云和雨',       bn:'云雨观察员'},
     {id:'stars',    e:'✨', n:'星空星座',     bn:'星空观察员'},
     {id:'static',   e:'⚡', n:'静电',         bn:'静电小博士'},
     {id:'shadow',   e:'🌑', n:'光和影子',     bn:'影子小侦探'},
     {id:'ch-nature', e:'🏆', n:'自然大挑战', bn:'自然挑战王', boss:true},
   ]},

    water:{emoji:'💧',name:'水的研究员',date:'2026-06-30'},

    instrument:{emoji:'🎺',name:'乐器小行家',date:'2026-07-02'}},
    days:['2026-06-30','2026-07-01','2026-07-02']};
  try{ return JSON.parse(localStorage.getItem('kidspark_v1')||'{"badges":{},"days":[]}'); }
  catch(e){ return {badges:{},days:[]}; }
}
const data=loadData(), badges=data.badges||{}, days=data.days||[], daily=data.daily||{};
const isDone=id=>!!badges[id];

/* ===== 组装线性站点序列 ===== */
const ALL=[]; // 只含课程，用于统计
const SEQ=[{type:'start'}];
REGIONS.forEach(r=>{
  r.lessons.forEach((l,i)=>{ ALL.push(l); SEQ.push({type:'lesson', ...l, rc:r.color, region:r.name,
    ribbon:i===0?r:null}); });
  const chestDone=r.lessons.every(l=>isDone(l.id));
  SEQ.push({type:'chest', rc:r.color, ico:r.chest, region:r.name, gift:r.gift, done:chestDone});
});
const allDone=ALL.every(l=>isDone(l.id));
SEQ.push({type:'final', done:allDone});

/* 当前站点 = 第一个没完成的课程 */
let currentId=null;
for(const l of ALL){ if(!isDone(l.id)){ currentId=l.id; break; } }

/* 课程 → 主题key（给今日大挑战按当天涉及的主题出题）*/
const REGION_KEYS=['nature','art','world','bio','game','logic','space','math','animal','tech','life','heart','plant','chinese','food','math2'];
const L2R={}; REGIONS.forEach((r,k)=> r.lessons.forEach(l=> L2R[l.id]=REGION_KEYS[k]||'x'));

/* ===== 布局：枢纽式 —— 一个起点 → 各主题从主干分叉（鱼骨图）===== */
const mapEl=document.getElementById('map');
const svg=document.getElementById('trail');
function layout(){
  const W=mapEl.clientWidth, small=W<420, cx=W*0.5;
  const ROW=small?126:140;          // 主题节点竖向间距
  const TOP=70;
  const SIDE=small?70:96;           // 主题节点离主干多远
  const nodes=[], links=[];
  let y=TOP;
  nodes.push({type:'start', x:cx, y}); const startY=y;
  y+=ROW*0.9;
  REGIONS.forEach((r,k)=>{
    const side=k%2===0?-1:1;                     // 左右交替
    const nx=cx+side*SIDE;
    const total=r.lessons.length, done=r.lessons.filter(l=>isDone(l.id)).length;
    const hasCur=r.lessons.some(l=>l.id===currentId);
    nodes.push({type:'region', k, r, done, total, allDone:done===total, hasCur, x:nx, y});
    links.push({color:r.color, x1:cx, y1:y, x2:nx, y2:y});   // 主干→主题 的横向分叉
    y+=ROW;
  });
  const allDoneNow=ALL.every(l=>isDone(l.id));
  nodes.push({type:'final', done:allDoneNow, x:cx, y}); const finalY=y;
  const H=y+90;
  mapEl.style.height=H+'px';
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`); svg.setAttribute('width',W); svg.setAttribute('height',H);

  // 主干（棕色竖线）+ 每条分叉用该主题色
  let paths=`<path d="M${cx} ${startY} L${cx} ${finalY}" fill="none" stroke="#c79a5f" stroke-width="9" stroke-linecap="round" stroke-dasharray="2 16" opacity=".7"/>`;
  links.forEach(b=>{ paths+=`<path d="M${cx} ${b.y1.toFixed(1)} L${b.x2.toFixed(1)} ${b.y2.toFixed(1)}" fill="none" stroke="${b.color}" stroke-width="9" stroke-linecap="round" stroke-dasharray="2 14" opacity=".7"/>`; });
  svg.innerHTML=paths;

  // 清掉旧节点，重画
  [...mapEl.querySelectorAll('.node,.ribbon')].forEach(n=>n.remove());
  nodes.forEach(s=>{
    const el=document.createElement('div'); el.className='node'; el.style.left=s.x+'px'; el.style.top=s.y+'px';
    if(s.type==='region'){
      el.classList.add('big'); el.style.setProperty('--rc', s.allDone? '#f5b731' : s.r.color);
      if(s.allDone) el.classList.add('done');
      if(s.hasCur) el.classList.add('here');
      el.innerHTML=`${s.hasCur?'<div class="hereFlag">🧭 现在这里</div>':''}
        <div class="disc">${s.allDone?'🎁':s.r.ico}</div>
        <div class="nm">${s.r.name}</div>
        <div class="nsub">${s.allDone? '✨ 全通关·点开领宝' : '已完成 '+s.done+'/'+s.total}</div>`;
      el.onclick=()=>openRegion(s.k);
    } else if(s.type==='start'){
      el.classList.add('big'); el.style.setProperty('--rc','#ff9f43');
      el.innerHTML=`<div class="disc" style="box-shadow:0 8px 18px rgba(120,80,20,.25), inset 0 0 0 5px #ff9f43">🏁</div><div class="nm">出发！</div><div class="nsub">挑一个主题开始</div>`;
    } else { // final
      el.classList.add('big'); el.style.setProperty('--rc', s.done?'#f5b731':'#c79a5f'); if(!s.done) el.classList.add('locked');
      el.innerHTML=`<div class="disc" style="box-shadow:0 0 22px ${s.done?'rgba(245,183,49,.7)':'rgba(120,80,20,.2)'}, inset 0 0 0 5px ${s.done?'#f5b731':'#c79a5f'}">${s.done?'🏆':'🗝️'}</div>
        <div class="nm">${s.done?'大宝藏！':'终极宝藏'}</div><div class="nsub">${s.done?'全部通关啦！':'集齐所有宝箱解锁'}</div>`;
      el.onclick=()=>{ if(!s.done) bump(el); else burst(); };
    }
    mapEl.appendChild(el);
  });
}
/* 点主题 → 弹出该区课程清单 */
function openRegion(k){ const r=REGIONS[k], L=r.lessons; curDay=null;
  const norm=L.filter(l=>!l.boss), normDone=norm.filter(l=>isDone(l.id)).length;
  const bossUnlocked = normDone===norm.length;      // 本区常规课全通关才解锁挑战
  const allDoneReg=L.every(l=>isDone(l.id));
  document.getElementById('dayTitle').textContent=r.ico+' '+r.name;
  document.getElementById('daySub').textContent = allDoneReg
    ? `全区通关啦 ✓ · 宝物：${r.gift.name}`
    : `${norm.length} 节课 + 1 挑战 · 已完成 ${normDone}/${norm.length}`;
  let html='';
  if(allDoneReg) html+=`<div class="lrow done" onclick="openChestByRegion(${k})"><div class="le">${r.gift.e}</div><div class="lb"><div class="ln">领取宝物：${r.gift.name}</div><div class="lst">全区通关啦，点开领奖～</div></div><div class="lgo">领取</div></div>`;
  html+=L.map(l=>{ const dn=isDone(l.id);
    if(l.boss){
      if(!bossUnlocked) return `<div class="lrow" style="opacity:.6"><div class="le">🔒</div><div class="lb"><div class="ln">${l.n}</div><div class="lst">先把本区其它课上完，再来挑战～</div></div><div class="lgo" style="background:#e6e0d2;color:#9a8a6a">未解锁</div></div>`;
      return `<div class="lrow ${dn?'done':''}" style="background:${dn?'#eefaf0':'#fff4e0'}" onclick="goLessonR('${l.id}',${k})"><div class="le">${l.e}</div><div class="lb"><div class="ln">${l.n}<span style="font-size:11px;color:#e0692c"> 高阶</span></div><div class="lst">${dn?'✓ 挑战成功 · 可再战':'⚔️ 综合大挑战，来试试！'}</div></div><div class="lgo">${dn?'再战':'挑战 ▶'}</div></div>`;
    }
    return `<div class="lrow ${dn?'done':''}" onclick="goLessonR('${l.id}',${k})"><div class="le">${l.e}</div><div class="lb"><div class="ln">${l.n}</div><div class="lst">${dn?'✓ 已完成 · 点开可复习':'点这里去上这一课'}</div></div><div class="lgo">${dn?'复习':'开始 ▶'}</div></div>`; }).join('');
  document.getElementById('dayList').innerHTML=html;
  document.getElementById('daysheet').classList.add('on');
}
function openChestByRegion(k){ const r=REGIONS[k]; closeDay(); openChest({region:r.name, gift:r.gift, done:true}); }
function goLessonR(id,k){ try{ localStorage.removeItem('kidspark_ret'); localStorage.setItem('kidspark_retR', k); }catch(e){} location.href='lessons/'+id+'/index.html'; }
function bump(el){ el.animate([{transform:'translate(-50%,-50%) scale(1)'},{transform:'translate(-50%,-50%) scale(1.08)'},{transform:'translate(-50%,-50%) scale(1)'}],{duration:280}); }

/* ===== HUD + 战利品架 ===== */
const got=ALL.filter(l=>isDone(l.id)).length;
document.getElementById('cBadge').textContent=got;
document.getElementById('cTotal').textContent=ALL.length;

/* 连续打卡 streak：从最近一天往回数连续天数 */
function calcStreak(ds){ if(!ds.length) return 0; const set=new Set(ds); const sorted=[...ds].sort();
  let d=new Date(sorted[sorted.length-1]+'T00:00:00'); let n=0;
  while(set.has(d.toISOString().slice(0,10))){ n++; d.setDate(d.getDate()-1); } return n; }
const streak=calcStreak(days);
document.getElementById('cStreak').textContent=streak;
if(streak<1){ document.getElementById('chipStreak').style.opacity='.55'; }

/* ===== 日历排程 ===== */
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDays(s,n){const p=s.split('-').map(Number);return fmt(new Date(p[0],p[1]-1,p[2]+n));}
const _now=new Date(), todayStr=fmt(_now);
const PER_DAY=15; // 每天安排几课（想改多改少，改这一个数字就行）
const bucket={}; const put=(ds,l)=>{(bucket[ds]||(bucket[ds]=[])).push(l);};
/* 历史：已完成的课 → 按真实完成日期落位（挑战课boss不进日历，是可选高阶） */
ALL.forEach(l=>{ if(l.boss) return; if(isDone(l.id)) put((badges[l.id]&&badges[l.id].date)||todayStr, l); });
/* 未来：未完成的课 → 今天起每天 PER_DAY 课（弹性：想多做可点明天的格子提前上） */
/* 今天的额度要先扣掉今天已完成的，不然做完一批又补一批，越做越多 */
/* 顺序随机：按课程id做稳定哈希打乱，让奥数等同类不扎堆、每天混着不同主题；
   用哈希而非Math.random()，保证每次刷新顺序不变、日历不乱跳 */
function _seed(s){let x=2166136261>>>0;for(let i=0;i<s.length;i++){x^=s.charCodeAt(i);x=Math.imul(x,16777619);}return x>>>0;}
/* 光按 id 哈希排会碰巧把同一个区的课排到同一天（出现过一天全是数学勇士营）。
   改成「按区轮流发牌」：先把未完成的课按区分组，每组内部哈希打乱，
   然后第 1 轮每个区各出 1 课、第 2 轮再各出 1 课……
   这样连着的课必定来自不同区，一天 PER_DAY 课自然覆盖 PER_DAY 个不同主题（≥5）。*/
const _undone=ALL.filter(l=>!isDone(l.id) && !l.boss);
const _byRegion=new Map();
_undone.forEach(l=>{ const r=L2R[l.id]||'x'; if(!_byRegion.has(r)) _byRegion.set(r,[]); _byRegion.get(r).push(l); });
_byRegion.forEach(g=> g.sort((a,b)=>_seed(a.id)-_seed(b.id)));           // 区内顺序随机
const _regions=[..._byRegion.keys()].sort((a,b)=>_seed(a)-_seed(b));     // 区的出场顺序也随机
const undoneList=[];
for(let round=0; ; round++){
  let picked=false;
  for(const r of _regions){ const g=_byRegion.get(r); if(round<g.length){ undoneList.push(g[round]); picked=true; } }
  if(!picked) break;
}
const capToday=Math.max(0, PER_DAY-(bucket[todayStr]||[]).length);
undoneList.forEach((l,i)=> put(addDays(todayStr, i<capToday ? 0 : 1+Math.floor((i-capToday)/PER_DAY)), l));
const todayGroup=bucket[todayStr]||[];               // 今天这一天的所有课
const todayTodo=todayGroup.filter(l=>!isDone(l.id));  // 今天还没上的

/* 点日历某天 → 弹出这天的课程清单 */
let curDay=null;
function openDay(ds){ const L=bucket[ds]; if(!L||!L.length) return; curDay=ds;
  const p=ds.split('-').map(Number); const isToday=ds===todayStr, isPast=ds<todayStr;
  const doneN=L.filter(l=>isDone(l.id)).length;
  document.getElementById('dayTitle').textContent=p[1]+'月'+p[2]+'日'+(isToday?' · 今天':'');
  document.getElementById('daySub').textContent = isToday
      ? `今天要上这 ${L.length} 节课 · 已完成 ${doneN}/${L.length}`
      : isPast ? `这天上了 ${L.length} 节课，全部完成 ✓`
      : `这天安排了 ${L.length} 节课（做完前面的就轮到这天）`;
  const allDayDone=L.every(l=>isDone(l.id));
  /* 大挑战做没做过、拿了几颗星，都要看得出来；做过了就跟课程一样沉到底部 */
  let head='', tailRow='';
  if(allDayDone){ const regs=[...new Set(L.map(l=>L2R[l.id]).filter(Boolean))].join(',');
    const go=`location.href='lessons/daily/index.html?r=${regs}&d=${ds}'`;
    const dc=daily[ds];
    if(dc) tailRow=`<div class="lrow done" onclick="${go}"><div class="le">🏆</div><div class="lb"><div class="ln">今日大挑战<span style="font-size:11px;color:#e0692c"> 综合</span></div><div class="lst">✓ 已挑战 · ${'⭐'.repeat(dc.s)}${'☆'.repeat(Math.max(0,dc.t-dc.s))} ${dc.s}/${dc.t} 星${dc.s<dc.t?' · 再战能拿满星':''}</div></div><div class="lgo">再战</div></div>`;
    else head=`<div class="lrow" style="background:#fff0dd" onclick="${go}"><div class="le">🏆</div><div class="lb"><div class="ln">今日大挑战<span style="font-size:11px;color:#e0692c"> 综合</span></div><div class="lst">这天的课都上完啦，来复习闯关拿星星！</div></div><div class="lgo">挑战 ▶</div></div>`; }
  /* 没上的排前面、已完成的沉到底部（各自内部保持原顺序），娃一打开就看到该做哪节 */
  const rows=[...L].sort((a,b)=>(isDone(a.id)?1:0)-(isDone(b.id)?1:0));
  document.getElementById('dayList').innerHTML = head + rows.map(l=>{ const done=isDone(l.id);
    return `<div class="lrow ${done?'done':''}" onclick="goLesson('${l.id}')">`
      +`<div class="le">${l.e}</div><div class="lb"><div class="ln">${l.n}</div>`
      +`<div class="lst">${done?'✓ 已完成 · 点开可复习':'点这里去上这一课'}</div></div>`
      +`<div class="lgo">${done?'复习':'开始 ▶'}</div></div>`; }).join('') + tailRow;
  document.getElementById('daysheet').classList.add('on');
}
/* 进课前记住在看哪天，做完回来自动弹回这天清单 */
function goLesson(id){ try{ localStorage.removeItem('kidspark_retR'); if(curDay) localStorage.setItem('kidspark_ret', curDay); }catch(e){} location.href='lessons/'+id+'/index.html'; }
function closeDay(){ document.getElementById('daysheet').classList.remove('on'); }
function calFromDay(){ closeDay(); openCal(); }
function cellTap(ds){ openDay(ds); }
let calY=_now.getFullYear(), calM=_now.getMonth();
function renderMonth(){
  document.getElementById('calLabel').textContent=calY+'年'+(calM+1)+'月';
  const wd=new Date(calY,calM,1).getDay(), dim=new Date(calY,calM+1,0).getDate();
  let html=''; for(let i=0;i<wd;i++) html+='<div class="cell empty"></div>';
  for(let d=1;d<=dim;d++){ const ds=fmt(new Date(calY,calM,d)); const L=bucket[ds]||[];
    const done=L.length&&L.every(l=>isDone(l.id));
    const isToday=ds===todayStr, isFuture=ds>todayStr;
    const clickable=L.length>0;
    let cls='cell'; if(done)cls+=' done'; if(isToday)cls+=' today'; if(isFuture&&!isToday)cls+=' future'; if(clickable)cls+=' has';
    let inner='<div class="dnum">'+d+'</div>';
    if(L.length===1) inner+='<div class="cemo">'+L[0].e+'</div>';
    else if(L.length>1) inner+='<div class="cemo">'+L[0].e+'</div><div class="ccnt">×'+L.length+'</div>';
    if(done) inner+='<div class="cchk">✅</div>';
    html+='<div class="'+cls+'"'+(clickable?' onclick="cellTap(\''+ds+'\')"':'')+'>'+inner+'</div>';
  }
  document.getElementById('calGrid').innerHTML=html;
}
function calMove(n){ calM+=n; if(calM<0){calM=11;calY--;} if(calM>11){calM=0;calY++;} renderMonth(); }
function openCal(){ document.getElementById('cal').classList.add('on'); calY=_now.getFullYear(); calM=_now.getMonth(); renderMonth(); }
function closeCal(){ document.getElementById('cal').classList.remove('on'); }

/* 顶部入口卡 + 日历内今日横幅 */
const today=document.getElementById('today'); const calToday=document.getElementById('calToday');
if(todayTodo.length){
  const doneToday=todayGroup.length-todayTodo.length;
  const names=todayTodo.slice(0,3).map(l=>l.n).join('、');
  today.innerHTML=`<div class="te">📅</div><div class="tb"><div class="tk">📅 今日任务</div><div class="tt">今天要上 ${todayGroup.length} 节课</div><div class="td">点这里看今天上哪些课～</div></div><div class="tgo">今天的课 ▶</div>`;
  calToday.innerHTML=`<div class="cte">📚</div><div class="ctb"><div class="ctk">🎯 今天要上 ${todayGroup.length} 节课（已完成 ${doneToday}）</div><div class="ctt">${names}</div><div class="ctd">点这里看今天的全部课程 →</div></div><div class="ctgo">查看 ▶</div>`;
  calToday.onclick=()=>openDay(todayStr);
  today.onclick=()=>openDay(todayStr);
}else{
  /* 课上完了不等于今天完事了——大挑战可能还没做，别急着说"全部完成"，
     而且这时候要能直接点进当天清单（原来跳日历，娃根本看不到大挑战）*/
  const dc=daily[todayStr], hasDay=todayGroup.length>0;
  if(hasDay && !dc){
    today.innerHTML=`<div class="te">🏆</div><div class="tb"><div class="tk">📅 今日任务</div><div class="tt">课都上完啦，还差最后一关！</div><div class="td">今日大挑战还没做，去拿星星～</div></div><div class="tgo">去挑战 ▶</div>`;
    calToday.innerHTML=`<div class="cte">🏆</div><div class="ctb"><div class="ctk">🎯 今天 ${todayGroup.length} 节课全上完</div><div class="ctt">还差今日大挑战</div><div class="ctd">点这里去挑战 →</div></div><div class="ctgo">挑战 ▶</div>`;
    calToday.onclick=()=>openDay(todayStr);
    today.onclick=()=>openDay(todayStr);
  }else{
    const st=dc?` · 大挑战 ${'⭐'.repeat(dc.s)}${'☆'.repeat(Math.max(0,dc.t-dc.s))} ${dc.s}/${dc.t} 星`:'';
    today.innerHTML=`<div class="te">🎉</div><div class="tb"><div class="tk">📅 今日任务</div><div class="tt">今天全部完成啦！🎉</div><div class="td">${dc?'大挑战拿了 '+dc.s+'/'+dc.t+' 星，':''}点这里回看今天的课～</div></div><div class="tgo">${hasDay?'今天的课 ▶':'打开日历 ▶'}</div>`;
    calToday.innerHTML=`<div class="cte">🎉</div><div class="ctb"><div class="ctk">✨ 全部完成${st}</div><div class="ctt">今天没有新课啦</div><div class="ctd">新的一批马上就来，明天再见～</div></div>`;
    calToday.style.cursor='default';
    today.onclick=()=>hasDay?openDay(todayStr):openCal();
  }
}
/* 做完一节课回来 → 自动弹回刚才在看的清单（日历那天 / 或某主题） */
try{ const ret=localStorage.getItem('kidspark_ret'), retR=localStorage.getItem('kidspark_retR');
  if(ret){ localStorage.removeItem('kidspark_ret'); if(bucket[ret]&&bucket[ret].length) openDay(ret); }
  else if(retR!=null){ localStorage.removeItem('kidspark_retR'); const kk=+retR; if(REGIONS[kk]) openRegion(kk); }
}catch(e){}

/* 宝箱彩蛋 */
function openChest(s){
  document.getElementById('rGift').textContent = s.gift? s.gift.e : '💎';
  document.getElementById('rName').textContent = s.gift? s.gift.name : '区域宝物';
  document.getElementById('rDesc').textContent = `你集齐了「${s.region}」的全部徽章，赢得区域宝物：${s.gift? s.gift.name : ''}！`;
  document.getElementById('reward').classList.add('on'); burst();
}
/* 战利品架：150 枚全平铺会刷屏（实测 3251px，占首页一大半，且 138 枚是灰锁），
   改成「最新赢到的 + 按区折叠」：默认只露最近 6 枚和 16 行进度条，想看细节再点开。*/
function medalH(l,on){ return on
  ? `<div class="medal"><div class="m">${l.e}</div><div class="mn">${l.bn}</div></div>`
  : `<div class="medal locked"><div class="m">🔒</div><div class="mn">${l.bn}</div></div>`; }
const earned=ALL.filter(l=>badges[l.id]);
document.getElementById('shelfCount').textContent=earned.length+' / '+ALL.length;
/* 最近赢到的排前面（按徽章上记的完成日期倒序） */
const recent=[...earned].sort((a,b)=>((badges[b.id]||{}).date||'').localeCompare((badges[a.id]||{}).date||'')).slice(0,6);
document.getElementById('shelfNew').innerHTML = earned.length
  ? `<div class="shSub">✨ 最新赢到的${earned.length>6?'（近 6 枚）':''}</div>
     <div class="shNew">${recent.map(l=>medalH(l,true)).join('')}</div>`
  : `<div class="shEmpty">还没有战利品～<br>上完一课就能赢到第一枚徽章！</div>`;
document.getElementById('shelf').innerHTML=REGIONS.map((r,k)=>{
  const got=r.lessons.filter(l=>badges[l.id]).length, tot=r.lessons.length, full=got===tot;
  return `<div class="shRow ${full?'full':''}" onclick="toggleShelf(${k},this)">
      <div class="sIco">${full?'🏅':r.ico}</div>
      <div class="sB"><div class="sN">${r.name}${full?' · 全收齐！':''}</div>
        <div class="sBar"><i style="width:${Math.round(got/tot*100)}%"></i></div></div>
      <div class="sNum">${got}/${tot}</div><div class="sAr">▶</div>
    </div>
    <div class="shGrid" id="sg${k}">${r.lessons.map(l=>medalH(l,!!badges[l.id])).join('')}</div>`;
}).join('');
function toggleShelf(k,row){ const g=document.getElementById('sg'+k);
  row.classList.toggle('open', g.classList.toggle('open')); }

/* 继续探险 → 滚到当前站点 */
document.getElementById('goBtn').onclick=()=>{
  const target=currentId? mapEl.querySelector('.node.here') : mapEl.querySelector('.node.big');
  if(target) target.scrollIntoView({behavior:'smooth', block:'center'});
};
if(allDone) document.getElementById('goBtn').textContent='🏆 全部通关';

/* 终极宝藏彩带 */
function burst(){ const cvs=document.createElement('canvas'); cvs.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:60';
  document.body.appendChild(cvs); const x=cvs.getContext('2d'); cvs.width=innerWidth; cvs.height=innerHeight;
  const cols=['#ff6a3d','#ffd36b','#3aa7ff','#41c98a','#b58bff','#ff8ac0'];
  const bits=Array.from({length:150},()=>({x:Math.random()*cvs.width,y:-20-Math.random()*cvs.height,s:6+Math.random()*8,vy:2+Math.random()*4,vx:(Math.random()-.5)*2,col:cols[Math.random()*cols.length|0],rot:Math.random()*7,vr:(Math.random()-.5)*.3}));
  let f=0;(function a(){ x.clearRect(0,0,cvs.width,cvs.height); f++;
    bits.forEach(b=>{b.y+=b.vy;b.x+=b.vx;b.rot+=b.vr;x.save();x.translate(b.x,b.y);x.rotate(b.rot);x.fillStyle=b.col;x.fillRect(-b.s/2,-b.s/2,b.s,b.s);x.restore();});
    if(f<220)requestAnimationFrame(a);else cvs.remove();})(); }

layout();
addEventListener('resize', layout);
if(location.hash==='#chest'){ const c=SEQ.find(s=>s.type==='chest'&&s.done)||SEQ.find(s=>s.type==='chest'); openChest(c); }
if(location.hash.indexOf('cal')>=0) openCal();
if(location.hash.indexOf('day')>=0){ openCal(); openDay(todayStr); }
</script>
