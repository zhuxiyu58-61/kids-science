<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>知识乐园 · 寻宝探险地图</title>
<style>
  :root{ --ink:#4a3418; --ink2:#8a7a5c; --gold:#f5b731; --trail:#c79a5f; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{margin:0;}
  body{ font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif; color:#4a3418;
    background:
      radial-gradient(120% 60% at 10% 0%, #fff7e2 0%, rgba(255,247,226,0) 60%),
      radial-gradient(120% 60% at 90% 20%, #ffeecb 0%, rgba(255,238,203,0) 55%),
      radial-gradient(140% 70% at 50% 100%, #d8f0e6 0%, rgba(216,240,230,0) 55%),
      linear-gradient(180deg,#fbeecb 0%, #f6e4bf 55%, #efdcae 100%);
    touch-action:manipulation; overflow-x:hidden;}

  header{text-align:center; padding:20px 16px 6px;}
  header h1{font-size:clamp(24px,5.5vw,38px); margin:0; font-weight:900; letter-spacing:2px;
    color:#7a4d17; text-shadow:0 2px 0 #fff3d6, 0 4px 10px rgba(150,100,30,.2);}
  header p{color:#a07c3e; font-weight:800; margin:5px 0 0; font-size:14px;}

  .hud{max-width:640px; margin:12px auto 4px; display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap;}
  .chip{background:#fff; color:#b6842b; font-weight:900; font-size:14px; padding:8px 15px; border-radius:16px;
    box-shadow:0 5px 14px rgba(150,100,30,.18); display:flex; align-items:center; gap:6px;}
  .chip b{color:#e07d1a;}
  .chip.green b{color:#2fa869;}
  .goBtn{background:linear-gradient(135deg,#ff9f43,#ff6a3d); color:#fff; border:none; font-weight:900;
    font-size:16px; padding:13px 24px; border-radius:20px; box-shadow:0 8px 20px rgba(230,110,40,.35);
    cursor:pointer; letter-spacing:1px; transition:transform .1s;}
  .goBtn:active{transform:scale(.95);}

  /* 地图画布 */
  #map{position:relative; width:100%; max-width:720px; margin:6px auto 0;}
  #trail{position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:1;}

  .node{position:absolute; transform:translate(-50%,-50%); z-index:2; text-align:center; cursor:pointer;}
  .node .disc{width:var(--d,84px); height:var(--d,84px); border-radius:50%; margin:0 auto;
    display:flex; align-items:center; justify-content:center; font-size:calc(var(--d,84px)*.46);
    background:#fff; box-shadow:0 8px 18px rgba(120,80,20,.25), inset 0 0 0 5px var(--rc,#5bc0ff);
    position:relative; transition:transform .12s;}
  .node:active .disc{transform:scale(.92);}
  .node .nm{margin-top:6px; font-weight:900; font-size:13px; color:#5a4118; line-height:1.25;
    max-width:120px; text-shadow:0 1px 0 #fff8e6;}
  .node .nsub{font-size:11px; color:#a07c3e; font-weight:700;}

  /* 完成态：金环 + 对勾 */
  .node.done .disc{box-shadow:0 8px 20px rgba(230,170,30,.5), inset 0 0 0 5px var(--gold);
    background:radial-gradient(circle at 50% 35%, #fffbe9, #ffedb8);}
  .node.done .disc::after{content:'✓'; position:absolute; right:-4px; bottom:-4px; width:26px; height:26px;
    background:#41c98a; color:#fff; border-radius:50%; font-size:15px; font-weight:900;
    display:flex; align-items:center; justify-content:center; box-shadow:0 3px 8px rgba(40,150,90,.4); border:2px solid #fff;}

  /* 当前位置 */
  .node.here .disc{animation:hb 1.3s ease-in-out infinite; box-shadow:0 0 0 6px rgba(255,159,67,.35), 0 8px 20px rgba(230,110,40,.4), inset 0 0 0 5px #ff8a3d;}
  @keyframes hb{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .hereFlag{position:absolute; top:-34px; left:50%; transform:translateX(-50%); white-space:nowrap;
    background:#ff6a3d; color:#fff; font-weight:900; font-size:12px; padding:5px 11px; border-radius:12px;
    box-shadow:0 5px 12px rgba(230,80,40,.4);}
  .hereFlag::after{content:''; position:absolute; bottom:-6px; left:50%; transform:translateX(-50%);
    border:6px solid transparent; border-top-color:#ff6a3d; border-bottom:0;}

  /* 宝箱 / 起点 / 终点 */
  .node.big .disc{--d2:96px; width:96px; height:96px; font-size:46px;}
  .node.chest .disc{background:radial-gradient(circle at 50% 35%,#fff3cf,#ffe0a0); box-shadow:0 8px 20px rgba(180,120,30,.35), inset 0 0 0 5px #e0a94b;}
  .node.chest.open .disc{background:radial-gradient(circle at 50% 35%,#fffbe9,#ffe89a); box-shadow:0 0 22px rgba(245,183,49,.7), inset 0 0 0 5px var(--gold);}
  .node.locked .disc{filter:grayscale(.5); opacity:.85;}

  /* 区域缎带 */
  .ribbon{position:absolute; transform:translate(-50%,-50%); z-index:2;
    background:var(--rc,#5bc0ff); color:#fff; font-weight:900; font-size:14px; padding:7px 16px 7px 14px;
    border-radius:0 16px 16px 0; box-shadow:0 6px 14px rgba(80,60,20,.25); white-space:nowrap;}
  .ribbon small{display:block; font-size:10px; opacity:.9; font-weight:800;}

  /* 战利品架 */
  .shelf{max-width:720px; margin:26px auto 10px; background:#fff; border-radius:22px; padding:16px 18px;
    box-shadow:0 10px 26px rgba(150,100,30,.16);}
  .shelf h3{margin:0 0 12px; font-size:16px; font-weight:900; color:#7a4d17; display:flex; align-items:center; gap:7px;}
  .shelf-grid{display:flex; gap:10px; flex-wrap:wrap;}
  .medal{width:70px; text-align:center;}
  .medal .m{width:56px; height:56px; border-radius:50%; margin:0 auto; display:flex; align-items:center; justify-content:center; font-size:28px;
    background:linear-gradient(160deg,#fff6df,#ffe09f); box-shadow:inset 0 0 0 3px #ffcf6b, 0 5px 12px rgba(240,180,60,.3);}
  .medal.locked .m{background:#f0ece2; box-shadow:none; filter:grayscale(1); opacity:.45;}
  .medal .mn{font-size:11px; font-weight:800; margin-top:4px; line-height:1.25; color:#6a5327;}
  .medal.locked .mn{color:#b3a789;}

  footer{max-width:720px; margin:18px auto 40px; text-align:center; color:#a07c3e; font-size:13px; font-weight:700;}

  /* 今日推荐 */
  .today{max-width:560px; margin:10px auto 2px; background:linear-gradient(135deg,#ffb347,#ff7a3d);
    border-radius:22px; padding:14px 18px; color:#fff; box-shadow:0 10px 24px rgba(230,120,40,.35);
    display:flex; align-items:center; gap:14px; cursor:pointer; transition:transform .12s;}
  .today:active{transform:scale(.98);}
  .today .te{font-size:44px; filter:drop-shadow(0 3px 4px rgba(0,0,0,.15));}
  .today .tb{flex:1;}
  .today .tk{font-size:12px; font-weight:900; opacity:.92; letter-spacing:1px;}
  .today .tt{font-size:20px; font-weight:900; margin:2px 0;}
  .today .td{font-size:12.5px; opacity:.92; font-weight:700;}
  .today .tgo{background:#fff; color:#e0692c; font-weight:900; padding:10px 16px; border-radius:14px; font-size:15px; white-space:nowrap;}

  /* 宝箱彩蛋弹层 */
  .reward{position:fixed; inset:0; z-index:80; display:none; align-items:center; justify-content:center;
    background:rgba(40,25,5,.5); backdrop-filter:blur(2px);}
  .reward.on{display:flex;}
  .reward .rcard{background:linear-gradient(180deg,#fffdf5,#fff2d6); border-radius:26px; padding:26px 30px 24px;
    box-shadow:0 20px 50px rgba(120,80,20,.4); text-align:center; max-width:340px; animation:rpop .4s ease;}
  @keyframes rpop{0%{transform:scale(.6); opacity:0}100%{transform:scale(1); opacity:1}}
  .reward .rchest{font-size:64px; animation:rshake .5s ease;}
  @keyframes rshake{0%,100%{transform:rotate(0)}25%{transform:rotate(-10deg)}75%{transform:rotate(10deg)}}
  .reward .rgift{font-size:80px; margin:2px 0; animation:gpop .6s ease .15s both;}
  @keyframes gpop{0%{transform:scale(0) translateY(20px)}70%{transform:scale(1.25)}100%{transform:scale(1) translateY(0)}}
  .reward h3{margin:6px 0 2px; font-size:22px; font-weight:900; color:#7a4d17;}
  .reward .rname{display:inline-block; background:linear-gradient(160deg,#ffd36b,#ff9f43); color:#fff; font-weight:900; font-size:16px; padding:6px 16px; border-radius:14px; margin:6px 0 10px;}
  .reward p{color:#a07c3e; font-weight:700; font-size:13.5px; margin:0 0 16px; line-height:1.6;}
  .reward button{border:none; border-radius:16px; padding:12px 26px; font-size:16px; font-weight:900; color:#fff; background:linear-gradient(135deg,#ff9f43,#ff6a3d); cursor:pointer;}
</style>
</head>
<body>
  <header>
    <h1>🗺️ 知识寻宝地图</h1>
    <p>沿着金色路线，一路探险 · 收集宝藏徽章</p>
  </header>

  <div class="hud">
    <span class="chip">🏆 找到宝藏 <b id="cBadge">0</b>/<span id="cTotal">0</span></span>
    <span class="chip" id="chipStreak" style="background:#ffe6d6;color:#e0692c;">🔥 连续 <b style="color:#e0692c" id="cStreak">0</b> 天</span>
    <button class="goBtn" id="goBtn">继续探险 ▶</button>
  </div>

  <div class="today" id="today"></div>

  <div id="map"><svg id="trail"></svg></div>

  <div class="reward" id="reward">
    <div class="rcard">
      <div class="rchest">🎁</div>
      <div class="rgift" id="rGift">💎</div>
      <h3>宝箱开启！</h3>
      <div class="rname" id="rName">区域宝物</div>
      <p id="rDesc">你集齐了这个探险区的全部徽章，赢得了区域宝物！</p>
      <button onclick="document.getElementById('reward').classList.remove('on')">收下宝物 ✓</button>
    </div>
  </div>

  <div class="shelf">
    <h3>🎖 我的战利品架</h3>
    <div class="shelf-grid" id="shelf"></div>
  </div>

  <footer>为小探险家设计 · 每天闯一关约 15–20 分钟 · 边玩边学</footer>

<script>
/* ===== 探险路线（顺序=闯关顺序；分 5 个探险区，每区尾部一个宝箱）===== */
const REGIONS=[
  {name:'自然探索岛', ico:'🌊', color:'#2ea7ef', chest:'🐚', gift:{e:'🦪', name:'深海珍珠'},
   lessons:[
     {id:'water',    e:'💧', n:'水的三个样子', bn:'水的研究员'},
     {id:'seed',     e:'🌱', n:'种子的旅行',   bn:'小小园丁'},
     {id:'daynight', e:'🌗', n:'白天和黑夜',   bn:'昼夜小博士'},
     {id:'magnet',   e:'🧲', n:'神奇的磁铁',   bn:'磁力小侦探'},
     {id:'float',    e:'🛟', n:'浮和沉',       bn:'沉浮小实验家'},
     {id:'rainbow',  e:'🌈', n:'彩虹的秘密',   bn:'彩虹小博士'},
     {id:'force',    e:'⚖️', n:'推和拉',       bn:'力气小专家'},
     {id:'moon',     e:'🌙', n:'月亮会变身',   bn:'月亮观察员'},
     {id:'weather',  e:'🌦️', n:'云和雨',       bn:'云雨观察员'},
     {id:'stars',    e:'✨', n:'星空星座',     bn:'星空观察员'},
     {id:'static',   e:'⚡', n:'静电',         bn:'静电小博士'},
     {id:'shadow',   e:'🌑', n:'光和影子',     bn:'影子小侦探'},
   ]},
  {name:'艺术城堡', ico:'🎨', color:'#b58bff', chest:'🎭', gift:{e:'🎼', name:'魔法乐谱'},
   lessons:[
     {id:'color',     e:'🎨', n:'颜色变变变', bn:'调色小画家'},
     {id:'sound',     e:'🎹', n:'好听的声音', bn:'声音小耳朵'},
     {id:'instrument',e:'🎺', n:'认识乐器',   bn:'乐器小行家'},
   ]},
  {name:'环球探险区', ico:'🧭', color:'#ff9f43', chest:'🧳', gift:{e:'🗺️', name:'古老藏宝图'},
   lessons:[
     {id:'direction', e:'🧭', n:'认识方向',     bn:'方向小达人'},
     {id:'ancient',   e:'🏯', n:'古人怎么生活', bn:'穿越小达人'},
     {id:'china',     e:'🗺️', n:'我们的中国',   bn:'爱国小导游'},
     {id:'landform',  e:'🗻', n:'高山河流海洋', bn:'地形小向导'},
     {id:'volcano',   e:'🌋', n:'火山喷发',     bn:'火山探险家'},
     {id:'seasons',   e:'🍂', n:'四季怎么来',   bn:'四季小博士'},
   ]},
  {name:'生命实验室', ico:'🧬', color:'#35c98a', chest:'🔬', gift:{e:'🧪', name:'生命结晶'},
   lessons:[
     {id:'body',     e:'🫀', n:'身体的秘密', bn:'人体小医生'},
     {id:'bug',      e:'🐛', n:'虫子变蝴蝶', bn:'昆虫小专家'},
     {id:'foodchain',e:'🦁', n:'谁吃谁',     bn:'食物链小侦探'},
     {id:'bones',    e:'🦴', n:'我们的骨头', bn:'骨骼小卫士'},
     {id:'dino',     e:'🦕', n:'恐龙时代',   bn:'恐龙探险家'},
     {id:'germs',    e:'🦠', n:'细菌和病毒', bn:'健康小卫士'},
   ]},
  {name:'游戏工坊', ico:'🎮', color:'#e05bb5', chest:'👾', gift:{e:'🕹️', name:'黄金手柄'},
   lessons:[
     {id:'game-character',e:'🎮', n:'角色怎么做',   bn:'角色设计师'},
     {id:'game-code',     e:'🕹️', n:'游戏听你的',   bn:'小小程序员'},
     {id:'game-physics',  e:'⚙️', n:'游戏假重力',   bn:'物理引擎师'},
     {id:'game-level',    e:'🗺️', n:'关卡怎么设计', bn:'关卡设计师'},
     {id:'game-ai',       e:'🤖', n:'电脑敌人',     bn:'AI训练师'},
   ]},
];

/* ===== 读进度 ===== */
function loadData(){
  if(location.hash==='#demo'||location.hash==='#chest') return {badges:{
    water:{emoji:'💧',name:'水的研究员',date:'2026-06-30'},
    seed:{emoji:'🌱',name:'小小园丁',date:'2026-07-01'},
    daynight:{emoji:'🌗',name:'昼夜小博士',date:'2026-07-02'},
    color:{emoji:'🎨',name:'调色小画家',date:'2026-07-02'},
    sound:{emoji:'🎹',name:'声音小耳朵',date:'2026-07-02'},
    instrument:{emoji:'🎺',name:'乐器小行家',date:'2026-07-02'}},
    days:['2026-06-30','2026-07-01','2026-07-02']};
  try{ return JSON.parse(localStorage.getItem('kidspark_v1')||'{"badges":{},"days":[]}'); }
  catch(e){ return {badges:{},days:[]}; }
}
const data=loadData(), badges=data.badges||{}, days=data.days||[];
const isDone=id=>!!badges[id];

/* ===== 组装线性站点序列 ===== */
const ALL=[]; // 只含课程，用于统计
const SEQ=[{type:'start'}];
REGIONS.forEach(r=>{
  r.lessons.forEach((l,i)=>{ ALL.push(l); SEQ.push({type:'lesson', ...l, rc:r.color, region:r.name,
    ribbon:i===0?r:null}); });
  const chestDone=r.lessons.every(l=>isDone(l.id));
  SEQ.push({type:'chest', rc:r.color, ico:r.chest, region:r.name, gift:r.gift, done:chestDone});
});
const allDone=ALL.every(l=>isDone(l.id));
SEQ.push({type:'final', done:allDone});

/* 当前站点 = 第一个没完成的课程 */
let currentId=null;
for(const l of ALL){ if(!isDone(l.id)){ currentId=l.id; break; } }

/* ===== 布局：蜿蜒排布 ===== */
const mapEl=document.getElementById('map');
const svg=document.getElementById('trail');
function layout(){
  const W=mapEl.clientWidth;
  const small=W<420;
  const GAP=small?116:132;
  const TOP=64, R=small?70:78;      // 蛇形振幅
  const cx=W*0.5;
  const pts=[];
  SEQ.forEach((s,i)=>{ pts.push({x:cx + R*Math.sin(i*0.72), y:TOP + i*GAP}); s._x=pts[i].x; s._y=pts[i].y; });
  const H=TOP + (SEQ.length-1)*GAP + 90;
  mapEl.style.height=H+'px';
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('width',W); svg.setAttribute('height',H);

  // 金色路线画到当前站点（未开始则第一段，全完成则整条）
  let goldUntil=SEQ.length-1;
  const curSeq=SEQ.findIndex(s=>s.type==='lesson'&&s.id===currentId);
  if(curSeq>=0) goldUntil=curSeq;
  const d=pts.map((p,i)=>(i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' ');
  const dGold=pts.slice(0,goldUntil+1).map((p,i)=>(i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' ');
  svg.innerHTML=`
    <path d="${d}" fill="none" stroke="#c79a5f" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="2 20" opacity=".8"/>
    <path d="${dGold}" fill="none" stroke="#f5b731" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="2 20"/>
  `;

  // 清掉旧节点，重画
  [...mapEl.querySelectorAll('.node,.ribbon')].forEach(n=>n.remove());
  SEQ.forEach((s,i)=>{
    if(s.ribbon){ const rb=document.createElement('div'); rb.className='ribbon';
      rb.style.setProperty('--rc',s.rc);
      rb.style.left=(s._x<cx? s._x+ (small?60:70) : s._x-(small?60:70))+'px';
      rb.style.top=s._y+'px';
      rb.innerHTML=`${s.ribbon.ico} ${s.ribbon.name}<small>探险区</small>`;
      mapEl.appendChild(rb); }
    const el=document.createElement('div'); el.className='node'; el.style.left=s._x+'px'; el.style.top=s._y+'px';
    el.style.setProperty('--rc', s.rc||'#c79a5f');
    if(s.type==='lesson'){
      if(isDone(s.id)) el.classList.add('done');
      if(s.id===currentId) el.classList.add('here');
      el.innerHTML=`${s.id===currentId?'<div class="hereFlag">🧭 你在这里</div>':''}
        <div class="disc">${s.e}</div><div class="nm">${s.n}</div>`;
      el.onclick=()=>location.href=`lessons/${s.id}/index.html`;
    } else if(s.type==='chest'){
      el.classList.add('big','chest'); if(s.done) el.classList.add('open'); else el.classList.add('locked');
      el.innerHTML=`<div class="disc">${s.done?'🎁':'📦'}</div>
        <div class="nm">${s.region}</div><div class="nsub">${s.done?'✨ 点开领宝物':'集齐徽章开启'}</div>`;
      el.onclick=()=>{ if(s.done) openChest(s); else bump(el); };
    } else if(s.type==='start'){
      el.classList.add('big');
      el.innerHTML=`<div class="disc" style="box-shadow:0 8px 18px rgba(120,80,20,.25), inset 0 0 0 5px #ff9f43">🏁</div><div class="nm">出发！</div>`;
    } else { // final
      el.classList.add('big'); if(!s.done) el.classList.add('locked');
      el.innerHTML=`<div class="disc" style="box-shadow:0 0 22px ${s.done?'rgba(245,183,49,.7)':'rgba(120,80,20,.2)'}, inset 0 0 0 5px ${s.done?'#f5b731':'#c79a5f'}">${s.done?'🏆':'🗝️'}</div>
        <div class="nm">${s.done?'大宝藏！':'终极宝藏'}</div><div class="nsub">${s.done?'全部通关啦！':'走完全程解锁'}</div>`;
      el.onclick=()=>{ if(!s.done) bump(el); else burst(); };
    }
    mapEl.appendChild(el);
  });
}
function bump(el){ el.animate([{transform:'translate(-50%,-50%) scale(1)'},{transform:'translate(-50%,-50%) scale(1.08)'},{transform:'translate(-50%,-50%) scale(1)'}],{duration:280}); }

/* ===== HUD + 战利品架 ===== */
const got=ALL.filter(l=>isDone(l.id)).length;
document.getElementById('cBadge').textContent=got;
document.getElementById('cTotal').textContent=ALL.length;

/* 连续打卡 streak：从最近一天往回数连续天数 */
function calcStreak(ds){ if(!ds.length) return 0; const set=new Set(ds); const sorted=[...ds].sort();
  let d=new Date(sorted[sorted.length-1]+'T00:00:00'); let n=0;
  while(set.has(d.toISOString().slice(0,10))){ n++; d.setDate(d.getDate()-1); } return n; }
const streak=calcStreak(days);
document.getElementById('cStreak').textContent=streak;
if(streak<1){ document.getElementById('chipStreak').style.opacity='.55'; }

/* 每日推荐一课 */
const today=document.getElementById('today');
if(allDone){
  today.innerHTML=`<div class="te">🏆</div><div class="tb"><div class="tk">全部通关</div><div class="tt">你找齐了所有宝藏！</div><div class="td">可以随时回味任意一关，也别忘了每天来看看有没有新关卡～</div></div><div class="tgo">看地图 ▶</div>`;
  today.onclick=()=>{ const fs=mapEl.querySelectorAll('.node.big'); fs[fs.length-1]?.scrollIntoView({behavior:'smooth',block:'center'}); };
}else{
  const cl=ALL.find(l=>l.id===currentId);
  const kicker = got===0 ? '🚩 开启你的寻宝之旅' : '🎯 今天就探这一关';
  today.innerHTML=`<div class="te">${cl.e}</div><div class="tb"><div class="tk">${kicker}</div><div class="tt">${cl.n}</div><div class="td">闯过它，点亮下一段金色路线！</div></div><div class="tgo">开始 ▶</div>`;
  today.onclick=()=>location.href=`lessons/${cl.id}/index.html`;
}

/* 宝箱彩蛋 */
function openChest(s){
  document.getElementById('rGift').textContent = s.gift? s.gift.e : '💎';
  document.getElementById('rName').textContent = s.gift? s.gift.name : '区域宝物';
  document.getElementById('rDesc').textContent = `你集齐了「${s.region}」的全部徽章，赢得区域宝物：${s.gift? s.gift.name : ''}！`;
  document.getElementById('reward').classList.add('on'); burst();
}
document.getElementById('shelf').innerHTML=ALL.map(l=>{ const b=badges[l.id];
  return b
    ? `<div class="medal"><div class="m">${l.e}</div><div class="mn">${l.bn}</div></div>`
    : `<div class="medal locked"><div class="m">🔒</div><div class="mn">${l.bn}</div></div>`;
}).join('');

/* 继续探险 → 滚到当前站点 */
document.getElementById('goBtn').onclick=()=>{
  const target=currentId? mapEl.querySelector('.node.here') : mapEl.querySelector('.node.big');
  if(target) target.scrollIntoView({behavior:'smooth', block:'center'});
};
if(allDone) document.getElementById('goBtn').textContent='🏆 全部通关';

/* 终极宝藏彩带 */
function burst(){ const cvs=document.createElement('canvas'); cvs.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:60';
  document.body.appendChild(cvs); const x=cvs.getContext('2d'); cvs.width=innerWidth; cvs.height=innerHeight;
  const cols=['#ff6a3d','#ffd36b','#3aa7ff','#41c98a','#b58bff','#ff8ac0'];
  const bits=Array.from({length:150},()=>({x:Math.random()*cvs.width,y:-20-Math.random()*cvs.height,s:6+Math.random()*8,vy:2+Math.random()*4,vx:(Math.random()-.5)*2,col:cols[Math.random()*cols.length|0],rot:Math.random()*7,vr:(Math.random()-.5)*.3}));
  let f=0;(function a(){ x.clearRect(0,0,cvs.width,cvs.height); f++;
    bits.forEach(b=>{b.y+=b.vy;b.x+=b.vx;b.rot+=b.vr;x.save();x.translate(b.x,b.y);x.rotate(b.rot);x.fillStyle=b.col;x.fillRect(-b.s/2,-b.s/2,b.s,b.s);x.restore();});
    if(f<220)requestAnimationFrame(a);else cvs.remove();})(); }

layout();
addEventListener('resize', layout);
if(location.hash==='#chest'){ const c=SEQ.find(s=>s.type==='chest'&&s.done)||SEQ.find(s=>s.type==='chest'); openChest(c); }
</script>
