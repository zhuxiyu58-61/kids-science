<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>自然大挑战 · 知识乐园</title>
<style>
  :root{ --acc:#2ea7ef; --acc2:#0d5b96; --bg1:#eaf6ff; --bg2:#c2e4fb; --ink:#123a5a; --ink2:#4a6f8c; --card:#fff; --shadow:0 10px 30px rgba(60,60,90,.16); }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{height:100%; margin:0;}
  body{ font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif; color:var(--ink);
    background:radial-gradient(120% 90% at 50% 0%, var(--bg1) 0%, var(--bg2) 70%, var(--bg2) 100%);
    overflow:hidden; touch-action:manipulation; display:flex; flex-direction:column; height:100vh; }
  .topbar{display:flex; align-items:center; gap:10px; padding:10px 16px;}
  .back{font-size:19px; background:#fff; border:none; border-radius:16px; padding:8px 14px; box-shadow:var(--shadow); color:var(--ink); font-weight:800; cursor:pointer;}
  .title{font-size:clamp(17px,2.8vw,24px); font-weight:900;} .title small{display:block; font-size:12px; color:var(--ink2); font-weight:700;}
  .scene{flex:1; min-height:0; display:none; flex-direction:column; align-items:center; justify-content:center; padding:6px 16px 16px; text-align:center;} .scene.active{display:flex;}
  .kico{font-size:96px; animation:bob 2.2s ease-in-out infinite;} @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .card{background:var(--card); border-radius:24px; padding:22px 26px; box-shadow:var(--shadow); max-width:600px; width:100%;}
  .introTxt{font-size:clamp(15px,2.2vw,19px); font-weight:700; line-height:1.7;} .introTxt b{color:var(--acc);}
  .bigbtn{border:none; border-radius:20px; padding:15px 40px; font-size:20px; font-weight:900; color:#fff; background:linear-gradient(160deg,var(--acc),var(--acc2)); box-shadow:var(--shadow); cursor:pointer; letter-spacing:1px; margin-top:18px;} .bigbtn:active{transform:scale(.95);}
  .prog{display:flex; align-items:center; justify-content:space-between; width:100%; max-width:600px; margin-bottom:10px; font-weight:900; color:var(--ink2);}
  .stars{font-size:15px; letter-spacing:0;}
  .qtag{display:inline-block; font-size:12px; font-weight:900; padding:3px 10px; border-radius:10px; margin-bottom:8px; background:#eef0f6; color:var(--acc2);}
  .qico{font-size:48px;} .qtext{font-size:20px; font-weight:900; margin:8px 0 16px; line-height:1.5;}
  .qopts{display:flex; flex-direction:column; gap:11px;} .qopt{border:3px solid #e3e6ef; background:#f7f8fc; border-radius:15px; padding:14px; font-size:17px; font-weight:800; color:var(--ink); cursor:pointer; text-align:left;} .qopt:active{transform:scale(.98);}
  .qopt.right{border-color:#41c98a; background:#e4fbef;} .qopt.wrong{border-color:#ff8a8a; background:#ffeaea;}
  .qfb{margin-top:12px; font-size:15px; font-weight:700; min-height:22px; line-height:1.5;}
  .medal{font-size:104px; animation:pop .5s ease;} @keyframes pop{0%{transform:scale(0) rotate(-30deg)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
  h2{margin:6px 0; font-size:26px;} .medalName{display:inline-block; background:linear-gradient(160deg,var(--acc),var(--acc2)); color:#fff; font-weight:900; font-size:18px; padding:8px 20px; border-radius:18px; margin:8px 0 10px;}
  .bigstars{font-size:34px; letter-spacing:3px; margin:6px 0 4px;}
  .resTxt{color:var(--ink2); font-weight:700; font-size:15px; margin:6px 0 16px;}
  .fbtns{display:flex; gap:12px; justify-content:center;} .fbtns button{border:none; border-radius:16px; padding:13px 22px; font-size:16px; font-weight:900; cursor:pointer;} .fb1{background:var(--acc); color:#fff;} .fb2{background:#eef0f6; color:var(--ink);}
  .confetti{position:fixed; inset:0; pointer-events:none; z-index:60;}
</style>
</head>
<body>
  <div class="topbar">
    <button class="back" onclick="location.href='../../index.html'">← 回乐园</button>
    <div class="title">🏆 自然大挑战<small>自然探索岛 · 高阶挑战</small></div>
  </div>

  <section class="scene active" id="s-intro">
    <div class="kico">🏆</div>
    <div class="card"><div class="introTxt">这是<b>自然探索岛</b>的大挑战！题目把你学过的<b>水、磁铁、彩虹、昼夜、浮沉…</b>全揉在一起，比平时难一点。答对 <b>8 道</b>就能拿下【<b>自然挑战王</b>】徽章。<br>第一次就答对才得 ⭐，看看你能拿几颗星！</div>
      <button class="bigbtn" onclick="startQuiz()">接受挑战 ▶</button></div>
  </section>

  <section class="scene" id="s-quiz">
    <div class="prog"><span id="pnum"></span><span class="stars" id="pstars"></span></div>
    <div class="card"><div class="qtag" id="qtag">挑战</div><div class="qico" id="qico">❓</div><div class="qtext" id="qtext"></div><div class="qopts" id="qopts"></div><div class="qfb" id="qfb"></div></div>
  </section>

  <section class="scene" id="s-finish">
    <div class="card"><div class="medal" id="medal">🏅</div><h2 id="fhead">挑战成功！</h2>
      <div class="medalName">🎖 自然挑战王</div>
      <div class="bigstars" id="bigstars"></div><div class="resTxt" id="resTxt"></div>
      <div class="fbtns"><button class="fb2" onclick="location.reload()">再挑战一次</button><button class="fb1" onclick="location.href='../../index.html'">回乐园</button></div>
    </div>
  </section>
  <canvas class="confetti" id="confetti"></canvas>

<script>
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
const BADGE={id:'ch-nature', emoji:'🏆', name:'自然挑战王'};
const QUIZ=[
 {ico:'💧',q:'一杯水放进冰箱，变成冰，是因为？',opts:[['遇冷',1],['遇热',0],['吹风',0]],fb:'遇冷会结冰（凝固）；遇热又会化成水。'},
 {ico:'🧲',q:'磁铁能吸铁钉，那塑料尺子呢？',opts:[['吸不住',1],['也能吸住',0],['吸一半',0]],fb:'磁铁只吸铁一类的东西，塑料吸不住。'},
 {ico:'🚢',q:'一块铁会沉，做成船的形状放水里会？',opts:[['浮起来',1],['还是沉',0],['一半浮',0]],fb:'做成船的形状能托住更多水，就浮起来了。'},
 {ico:'🌈',q:'彩虹一般什么时候出现？',opts:[['太阳照到小雨滴时',1],['晚上',0],['刮大风时',0]],fb:'阳光穿过空气里的小雨滴，被分成七色。'},
 {ico:'🌍',q:'白天和黑夜换来换去，是因为地球在？',opts:[['自己转圈（自转）',1],['一动不动',0],['绕着月亮转',0]],fb:'地球自转，转到向着太阳就是白天。'},
 {ico:'⚡',q:'冬天脱毛衣噼啪响，还能吸起小纸屑，这是？',opts:[['静电',1],['磁铁',0],['热',0]],fb:'摩擦产生了静电，能隔空吸小东西。'},
 {ico:'🌑',q:'影子什么时候最长？',opts:[['太阳很低的清晨或傍晚',1],['正午太阳在头顶',0],['半夜',0]],fb:'太阳越低，影子拉得越长。'},
 {ico:'🌕',q:'月亮自己会发光吗？',opts:[['不会，它反射太阳光',1],['会，自己发光',0],['只有晚上才发光',0]],fb:'月亮不发光，是把太阳的光反射给我们。'},
];

let qi=0, wrongThis=0, stars=0;
const SC=['intro','quiz','finish'];
function show(n){ document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active')); document.getElementById('s-'+n).classList.add('active'); }
function startQuiz(){ qi=0; stars=0; show('quiz'); renderQ(); }
function renderQ(){ const it=QUIZ[qi]; wrongThis=0;
  document.getElementById('pnum').textContent=`第 ${qi+1} / ${QUIZ.length} 关`;
  document.getElementById('pstars').textContent='⭐'.repeat(stars)+'☆'.repeat(QUIZ.length-stars);
  document.getElementById('qico').textContent=it.ico; document.getElementById('qtext').textContent=it.q;
  const box=document.getElementById('qopts'); box.innerHTML=''; document.getElementById('qfb').textContent='';
  shuffle(it.opts.slice()).forEach(([l,ok])=>{ const b=document.createElement('div'); b.className='qopt'; b.textContent=l; b.onclick=()=>ans(b,ok,it.fb); box.appendChild(b); });
}
function ans(el,ok,fb){ const fbEl=document.getElementById('qfb');
  if(ok){ el.classList.add('right'); document.querySelectorAll('.qopt').forEach(o=>o.style.pointerEvents='none');
    if(wrongThis===0) stars++;
    fbEl.style.color='#2ba36a'; fbEl.innerHTML='✅ '+fb;
    setTimeout(()=>{ qi++; if(qi<QUIZ.length) renderQ(); else finish(); },1400);
  } else { wrongThis++; el.classList.add('wrong'); el.style.pointerEvents='none'; fbEl.style.color='#e06060'; fbEl.textContent='🤔 再想想～'; }
}
function finish(){ show('finish');
  document.getElementById('bigstars').textContent='⭐'.repeat(stars)+'☆'.repeat(QUIZ.length-stars);
  document.getElementById('resTxt').textContent = stars===QUIZ.length? '太厉害啦！全部一次答对，满星通关！🎉' : `你拿到了 ${stars} / ${QUIZ.length} 颗星，很棒！再挑战一次能拿满星哦～`;
  saveBadge(BADGE.id,BADGE.emoji,BADGE.name); celebrate();
}
function saveBadge(id,emoji,name){ try{ const k='kidspark_v1'; const d=JSON.parse(localStorage.getItem(k)||'{"badges":{},"days":[]}'); d.badges[id]={emoji,name,date:new Date().toISOString().slice(0,10)}; const t=new Date().toISOString().slice(0,10); if(!d.days.includes(t))d.days.push(t); localStorage.setItem(k,JSON.stringify(d)); }catch(e){} }
function celebrate(){ const c=document.getElementById('confetti'), x=c.getContext('2d'); c.width=innerWidth; c.height=innerHeight; const cols=['#2ea7ef','#ffd36b','#3aa7ff','#41c98a','#b58bff','#ff8ac0']; const bits=Array.from({length:140},()=>({x:Math.random()*c.width,y:-20-Math.random()*c.height,s:6+Math.random()*8,vy:2+Math.random()*4,vx:(Math.random()-.5)*2,col:cols[Math.random()*cols.length|0],rot:Math.random()*7,vr:(Math.random()-.5)*.3}));
  let f=0;(function a(){ x.clearRect(0,0,c.width,c.height); f++; bits.forEach(b=>{b.y+=b.vy;b.x+=b.vx;b.rot+=b.vr;x.save();x.translate(b.x,b.y);x.rotate(b.rot);x.fillStyle=b.col;x.fillRect(-b.s/2,-b.s/2,b.s,b.s);x.restore();}); if(f<240)requestAnimationFrame(a);else x.clearRect(0,0,c.width,c.height);})(); }
if(location.hash==='#quiz') startQuiz(); else if(location.hash==='#finish'){ stars=6; show('finish'); document.getElementById('bigstars').textContent='⭐⭐⭐⭐⭐⭐☆☆'; }

/* ===== 掌握模式 v1 ===== */
/* 答错必讲解+锁读秒;答对手动翻页;错题末尾重考到会。覆盖上面的 ans()。 */
var _mzRetry=[], _mzFirst={}, _mzR2=0, _mzLock=0;
function _mzOpts(){ return document.querySelectorAll('#qopts .qopt'); }
function _mzSetLock(on){ _mzOpts().forEach(function(o){ if(!o.dataset.dead) o.style.pointerEvents = on?'none':''; }); }
function _mzBtn(txt,cb){
  var f=document.getElementById('qfb');
  var b=document.createElement('button');
  b.textContent=txt;
  b.style.cssText='display:block;margin:14px auto 2px;border:none;border-radius:14px;padding:11px 26px;font-size:16px;font-weight:900;color:#fff;cursor:pointer;background:var(--accent,var(--acc,#2b7de9));';
  b.onclick=cb; f.appendChild(b);
}
function _mzStarNote(){
  if(typeof stars!=='undefined') return;  /* 挑战课自带星级,不重复插 */
  var n=QUIZ.length, got=0; for(var k in _mzFirst){ if(_mzFirst[k]) got++; }
  var card=document.querySelector('.finishCard'); if(!card) return;
  if(card.querySelector('._mzStar')) return;
  var d=document.createElement('div'); d.className='_mzStar';
  d.style.cssText='margin:2px 0 12px;font-weight:900;font-size:15px;line-height:1.6;';
  if(got>=n){ d.style.color='#e8a51b'; d.innerHTML='⭐⭐⭐ 满星通关！'+n+' 题全部<b>一次就答对</b>，是真的懂了！'; }
  else { d.style.color='#8a8f98'; d.innerHTML='⭐ 一次答对 <b>'+got+'/'+n+'</b> 题<br><span style="font-size:13px;font-weight:700">有 '+(n-got)+' 题是重做才对的，下次争取一遍过～</span>'; }
  var h=card.querySelector('h2'); if(h) h.insertAdjacentElement('afterend',d); else card.prepend(d);
}
function _mzFin(){ _mzStarNote(); if(typeof finish==='function') finish(); else go('finish'); }
function _mzMark(){ var p=document.getElementById('qprog'); if(p) p.textContent='🔁 错题重考 · 还剩 '+_mzRetry.length+' 题'; }
function _mzRetryCard(){
  var ico=document.getElementById('qico'), tx=document.getElementById('qtext');
  if(ico) ico.textContent='🔁';
  if(tx) tx.innerHTML='刚才有 <b>'+_mzRetry.length+'</b> 题答错了。<br>再考一遍，真会了才算过！';
  document.getElementById('qopts').innerHTML='';
  var p=document.getElementById('qprog'); if(p) p.textContent='错题重考';
  var f=document.getElementById('qfb'); f.style.color='#8a8f98'; f.innerHTML='';
  _mzBtn('好，再来一遍 ▶', function(){ qi=_mzRetry[0]; renderQ(); _mzMark(); });
}
function _mzAdvance(){
  if(!_mzR2){
    qi++;
    if(qi<QUIZ.length){ renderQ(); return; }
    if(_mzRetry.length){ _mzR2=1; _mzRetryCard(); return; }
    _mzFin(); return;
  }
  _mzRetry.shift();
  if(_mzRetry.length){ qi=_mzRetry[0]; renderQ(); _mzMark(); return; }
  _mzFin();
}
function ans(el,ok,fb){
  if(_mzLock) return;
  var f=document.getElementById('qfb'), idx=qi;
  if(!ok){
    if(_mzFirst[idx]===undefined) _mzFirst[idx]=0;
    if(!_mzR2 && _mzRetry.indexOf(idx)<0) _mzRetry.push(idx);
    el.classList.add('wrong'); el.dataset.dead='1'; el.style.pointerEvents='none'; el.style.opacity='.4';
    _mzLock=1; _mzSetLock(true);
    f.style.color='#e06060';
    f.innerHTML='❌ 不对哦～<br><span style="color:#4a5058;font-weight:700">💡 '+fb+'</span><br><span class="_mzTick" style="color:#9aa0a8;font-size:13px;font-weight:700">读一读上面这句，<b>3</b> 秒后再选一次…</span>';
    var n=3, t=setInterval(function(){
      n--; var tk=document.querySelector('._mzTick');
      if(n>0){ if(tk) tk.innerHTML='读一读上面这句，<b>'+n+'</b> 秒后再选一次…'; return; }
      clearInterval(t); _mzLock=0; _mzSetLock(false);
      if(tk) tk.innerHTML='👆 现在再选一次';
    },1000);
    return;
  }
  if(_mzFirst[idx]===undefined){ _mzFirst[idx]=1; if(typeof stars!=='undefined') stars++; }
  el.classList.add('right'); _mzSetLock(true);
  f.style.color='#2ba36a'; f.innerHTML='✅ '+fb;
  var last = _mzR2 ? (_mzRetry.length<=1) : (qi>=QUIZ.length-1 && !_mzRetry.length);
  _mzBtn(last?'我懂了，完成 ▶':'我懂了，下一题 ▶', _mzAdvance);
}

</script>
</body>
</html>
