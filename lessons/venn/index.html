<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>圈圈里的秘密 · 知识乐园</title>
<style>
  :root{ --accent:#7a4fd6; --bg1:#f3efff; --bg2:#d8c9fa; --ink:#3a2a5c; --ink2:#6a5590; --card:#fff; --shadow:0 10px 30px rgba(90,60,170,.18); }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{height:100%; margin:0;}
  body{ font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif; color:var(--ink);
    background:radial-gradient(120% 90% at 50% 0%, var(--bg1) 0%, var(--bg2) 70%, var(--bg2) 100%);
    overflow:hidden; touch-action:manipulation; display:flex; flex-direction:column; height:100vh; }
  .topbar{display:flex; align-items:center; gap:10px; padding:10px 16px;}
  .back{font-size:19px; background:#fff; border:none; border-radius:16px; padding:8px 14px; box-shadow:var(--shadow); color:var(--ink); font-weight:800; cursor:pointer;}
  .title{font-size:clamp(17px,2.8vw,26px); font-weight:900;} .title small{display:block; font-size:12px; color:var(--ink2); font-weight:700;}
  .steps{margin-left:auto; display:flex; gap:8px;} .dot{width:13px; height:13px; border-radius:50%; background:#ffffffb0; transition:.3s;} .dot.on{background:var(--accent); transform:scale(1.2);}
  .scene{flex:1; min-height:0; display:none; flex-direction:column; padding:2px 16px 14px;} .scene.active{display:flex;}
  #s-intro{align-items:center; justify-content:center; text-align:center;}
  .kico{font-size:88px;}
  .introCard{background:var(--card); border-radius:24px; padding:22px 28px; box-shadow:var(--shadow); max-width:600px; font-size:clamp(15px,2.2vw,19px); font-weight:700; line-height:1.7;} .introCard b{color:var(--accent);}
  .bigbtn{border:none; border-radius:20px; padding:15px 38px; font-size:20px; font-weight:900; color:#fff; background:linear-gradient(160deg,#a481ea,#6a3fc4); box-shadow:var(--shadow); cursor:pointer; letter-spacing:1px; margin-top:18px;} .bigbtn:active{transform:scale(.95);}
  .exTabs{display:flex; gap:10px; justify-content:center; margin-bottom:8px;}
  .exTab{border:none; background:#ffffffcc; color:var(--ink2); font-weight:800; font-size:15px; padding:9px 18px; border-radius:16px; cursor:pointer; box-shadow:var(--shadow);} .exTab.on{background:var(--accent); color:#fff;}
  .exBody{flex:1; min-height:0; display:flex;} .subview{flex:1; min-height:0; display:none; flex-direction:column; align-items:center; justify-content:center; gap:10px;} .subview.on{display:flex;} .exFoot{margin-top:8px;}
  .vennStage{position:relative; width:100%; max-width:520px; height:230px;}
  .circle{position:absolute; top:15px; width:230px; height:200px; border-radius:50%; display:flex; align-items:flex-start; justify-content:center; padding-top:14px; font-weight:900; font-size:15px; color:#fff;}
  .circle.cL{left:20px; background:rgba(122,79,214,.4);} .circle.cR{left:190px; background:rgba(224,50,122,.4);}
  .zone{position:absolute; top:0; height:100%; cursor:pointer;}
  .zone.zL{left:0; width:36%;} .zone.zM{left:36%; width:28%;} .zone.zR{left:64%; width:36%;}
  .zone.hl{background:rgba(255,255,255,.35); border-radius:16px;}
  .vennItems{display:flex; gap:6px; -webkit-overflow-scrolling:touch;}
  .placedIco{position:absolute; font-size:26px; transform:translate(-50%,-50%);}
  .stampRow{display:flex; gap:10px; flex-wrap:wrap; justify-content:center;}
  .vItem{background:#fff; border-radius:16px; box-shadow:var(--shadow); padding:8px 12px; text-align:center; cursor:pointer; border:3px solid transparent;} .vItem.sel{border-color:var(--accent); background:#f2ecff;} .vItem.done{opacity:.35; cursor:default;}
  .vItem .vi{font-size:26px;} .vItem .vn{font-size:11px; font-weight:800;}
  .vennCap{background:var(--card); border-radius:16px; padding:10px 16px; box-shadow:var(--shadow); font-size:14px; font-weight:800; max-width:560px; width:100%; text-align:center; min-height:42px; display:flex; align-items:center; justify-content:center;} .vennCap b{color:var(--accent);}
  .nextHint{background:#f0e9ff; border-radius:14px; padding:10px 14px; font-weight:800; color:#6a3fc4; font-size:14px; text-align:center;} .nextHint b{color:var(--accent);}
  .nextBtn{border:none; border-radius:16px; padding:14px; font-size:18px; font-weight:900; color:#fff; width:100%; background:linear-gradient(160deg,#a481ea,#6a3fc4); box-shadow:var(--shadow); cursor:pointer; display:none;} .nextBtn:active{transform:scale(.97);}
  #s-game{align-items:center;} .gameTitle{font-size:clamp(16px,2.4vw,21px); font-weight:900; text-align:center; margin:2px 0 12px;} .gameTitle small{display:block; font-size:13px; color:var(--ink2); font-weight:700; margin-top:2px;}
  .gsub{flex:1; min-height:0; width:100%; display:none; flex-direction:column; align-items:center;} .gsub.on{display:flex;}
  .roundNext{display:none; margin-top:18px; text-align:center;} .roundNext .ok{font-size:18px;font-weight:900;color:#2ba36a;margin-bottom:8px;}
  .bins{display:flex; gap:14px; width:100%; max-width:600px; justify-content:center;}
  .bin{flex:1; background:#ffffffcc; border:4px dashed #d3bdf5; border-radius:20px; padding:12px 8px; text-align:center; min-height:150px; transition:.2s;}
  .bin.over{border-color:var(--accent); background:#f0e9ff;} .bin.filled{border-style:solid; border-color:#41c98a; background:#e9fbf1;}
  .bin .binIco{font-size:32px;} .bin .binName{font-weight:900; font-size:16px; margin-top:4px;} .bin .binHint{font-size:12px; color:var(--ink2); font-weight:700;}
  .bin .binDrop{margin-top:8px; min-height:60px; display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:4px;}
  .tray{display:flex; gap:14px; margin-top:20px; justify-content:center; flex-wrap:wrap;}
  .item{background:#fff; border-radius:18px; box-shadow:var(--shadow); padding:12px 14px; text-align:center; cursor:grab; touch-action:none;}
  .item.dragging{cursor:grabbing; transform:scale(1.08) rotate(-3deg); box-shadow:0 18px 36px rgba(90,60,170,.3);}
  .item.placed{cursor:default; box-shadow:none; padding:5px 7px;}
  .item .itIco{font-size:34px;} .item.placed .itIco{font-size:24px;}
  .item .itName{font-weight:800; font-size:13px;} .item.placed .itName{font-size:10.5px;}
  .qcard{background:var(--card); border-radius:22px; box-shadow:var(--shadow); padding:22px 26px; max-width:600px; width:100%; text-align:center;} .qcard .qico{font-size:44px;} .qcard .qtext{font-size:18px; font-weight:900; margin:8px 0 16px; line-height:1.5;}
  .qtag{display:inline-block; font-size:12px; font-weight:900; padding:3px 10px; border-radius:10px; margin-bottom:6px;} .qtag.logic{background:#f0e9ff;color:#6a3fc4;} .qtag.en{background:#e3edff;color:#3f7ae0;}
  .qopts{display:flex; flex-direction:column; gap:10px;} .qopt{border:3px solid #ded0f7; background:#f7f2ff; border-radius:14px; padding:13px; font-size:16px; font-weight:800; color:var(--ink); cursor:pointer; text-align:left;} .qopt.right{border-color:#41c98a; background:#e4fbef;} .qopt.wrong{border-color:#ff8a8a; background:#ffeaea;}
  .qfb{margin-top:12px; font-size:15px; font-weight:700; min-height:22px; line-height:1.5;} .qprog{margin-bottom:12px; font-weight:800; color:var(--ink2);}
  #s-finish{align-items:center; justify-content:center; text-align:center;} .finishCard{background:var(--card); border-radius:26px; padding:26px 34px; box-shadow:var(--shadow); max-width:560px;}
  .medal{font-size:100px; animation:pop .5s ease;} @keyframes pop{0%{transform:scale(0) rotate(-30deg)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
  .finishCard h2{margin:4px 0; font-size:26px;} .medalName{display:inline-block; background:linear-gradient(160deg,#a481ea,#6a3fc4); color:#fff; font-weight:900; font-size:18px; padding:8px 20px; border-radius:18px; margin:8px 0 12px;}
  .finishCard p{color:var(--ink2); font-weight:600; line-height:1.9; margin:0 0 18px; font-size:15px; text-align:left;} .finishCard p b{color:var(--accent);}
  .finishBtns{display:flex; gap:12px; justify-content:center;} .finishBtns button{border:none; border-radius:16px; padding:13px 22px; font-size:16px; font-weight:900; cursor:pointer;} .fb1{background:var(--accent); color:#fff;} .fb2{background:#efe8f8; color:var(--ink);}
  .confetti{position:fixed; inset:0; pointer-events:none; z-index:60;}
</style>
</head>
<body>
  <div class="topbar">
    <button class="back" onclick="location.href='../../index.html'">← 回乐园</button>
    <div class="title">圈圈里的秘密<small>数学思维 · 分类与交集</small></div>
    <div class="steps"><span class="dot on" id="p0"></span><span class="dot" id="p1"></span><span class="dot" id="p2"></span><span class="dot" id="p3"></span></div>
  </div>

  <section class="scene active" id="s-intro">
    <div class="kico">🟣🔴</div>
    <div class="introCard">有的东西只属于一类，有的东西却<b>同时</b>属于两类！比如苹果——它既是<b>红色</b>的，又是<b>圆形</b>的。今天来玩转两个圈圈，找到<b>重叠</b>的秘密。</div>
    <button class="bigbtn" onclick="go('explore')">开始探索 ▶</button>
  </section>

  <section class="scene" id="s-explore">
    <div class="exTabs">
      <button class="exTab on" id="tabA" onclick="switchEx('A')">🍎 红色和圆形</button>
      <button class="exTab" id="tabB" onclick="switchEx('B')">🦋 有腿的和会飞的</button>
    </div>
    <div class="exBody">
      <div class="subview on" id="ex-A"></div>
      <div class="subview" id="ex-B"></div>
    </div>
    <div class="exFoot">
      <div class="nextHint" id="nextHint">🔎 两个圈圈都放完全部东西，就能去闯关！（<span id="cntA">0</span>/4 + <span id="cntB">0</span>/4）</div>
      <button class="nextBtn" id="nextBtn" onclick="go('game')">去闯关 ▶</button>
    </div>
  </section>

  <section class="scene" id="s-game">
    <div class="gameTitle" id="gameTitle">🎮 第 1 关 · 一个特点还是两个特点<small>把下面的东西，拖到对的筐里</small></div>
    <div class="gsub on" id="g-round1">
      <div class="bins">
        <div class="bin" data-k="both"><div class="binIco">🟣</div><div class="binName">又红又圆(重叠)</div><div class="binHint"></div><div class="binDrop"></div></div>
        <div class="bin" data-k="one"><div class="binIco">◐</div><div class="binName">只占一个特点</div><div class="binHint"></div><div class="binDrop"></div></div>
      </div>
      <div class="tray" id="tray"></div>
      <div class="roundNext" id="r1next"><div class="ok">全对啦！🎉</div><button class="bigbtn" onclick="startQuiz()">下一关 ▶</button></div>
    </div>
    <div class="gsub" id="g-quiz">
      <div class="qprog" id="qprog"></div>
      <div class="qcard"><div class="qtag" id="qtag"></div><div class="qico" id="qico">❓</div><div class="qtext" id="qtext"></div><div class="qopts" id="qopts"></div><div class="qfb" id="qfb"></div></div>
    </div>
  </section>

  <section class="scene" id="s-finish">
    <div class="finishCard"><div class="medal">🏅</div><h2>圈圈的秘密被你发现啦！</h2><div class="medalName">🎖 交集小专家</div>
      <p>你今天学到了：<br>• 一个东西可以同时符合<b>两个条件</b>，比如又红又圆的苹果；<br>• 两个圈重叠的地方，数学上叫<b>交集</b>；<br>• 只符合一个条件的东西，只待在一个圈里；<br>• 🔤 英语：方形 <b>square</b>。</p>
      <div class="finishBtns"><button class="fb2" onclick="location.reload()">再玩一次</button><button class="fb1" onclick="location.href='../../index.html'">回乐园，选下一课</button></div>
    </div>
  </section>
  <canvas class="confetti" id="confetti"></canvas>

<script>
const SCENES=['intro','explore','game','finish'];
function go(name){ document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active')); document.getElementById('s-'+name).classList.add('active'); const idx=SCENES.indexOf(name); SCENES.forEach((_,i)=>document.getElementById('p'+i).classList.toggle('on', i<=idx)); if(name==='finish') celebrate(); }
function switchEx(v){ document.getElementById('ex-A').classList.toggle('on',v==='A'); document.getElementById('ex-B').classList.toggle('on',v==='B'); document.getElementById('tabA').classList.toggle('on',v==='A'); document.getElementById('tabB').classList.toggle('on',v==='B'); }
let doneA=0, doneB=0;
function unlockGame(){ if(doneA>=4 && doneB>=4){ nextHint.style.display='none'; nextBtn.style.display='block'; } }

/* ===== 通用：造一个 venn 面板 ===== */
function buildVenn(mount, labelL, labelR, colorL, colorR, items, onPlace){
  mount.innerHTML=`
    <div class="vennStage" id="stage-${mount.id}">
      <div class="zone zL" data-z="L"></div><div class="zone zM" data-z="M"></div><div class="zone zR" data-z="R"></div>
      <div class="circle cL" style="background:${colorL}">${labelL}</div>
      <div class="circle cR" style="background:${colorR}">${labelR}</div>
    </div>
    <div class="stampRow" id="stamp-${mount.id}"></div>
    <div class="vennCap" id="cap-${mount.id}">点一个东西，再点它应该待的圈圈～</div>`;
  const stage=mount.querySelector('.vennStage'), stampRow=mount.querySelector('.stampRow'), cap=mount.querySelector('.vennCap');
  let sel=null;
  items.forEach((it,i)=>{ const d=document.createElement('div'); d.className='vItem'; d.dataset.i=i;
    d.innerHTML=`<div class="vi">${it.ico}</div><div class="vn">${it.name}</div>`;
    d.onclick=()=>{ if(d.classList.contains('done'))return; stampRow.querySelectorAll('.vItem').forEach(x=>x.classList.remove('sel')); d.classList.add('sel'); sel=i;
      cap.innerHTML=`选好了<b>${it.name}</b>，现在点上面对的圈圈区域！`; };
    stampRow.appendChild(d); });
  stage.querySelectorAll('.zone').forEach(z=>z.addEventListener('click',()=>{
    if(sel===null) return; const it=items[sel];
    if(z.dataset.z===it.zone){
      const r=stage.getBoundingClientRect();
      const px = it.zone==='L'?r.width*0.2 : it.zone==='R'?r.width*0.8 : r.width*0.5;
      const ic=document.createElement('div'); ic.className='placedIco'; ic.textContent=it.ico; ic.style.left=px+'px'; ic.style.top=(70+Math.random()*80)+'px';
      stage.appendChild(ic);
      const chip=stampRow.querySelector(`.vItem[data-i="${sel}"]`); chip.classList.add('done'); chip.classList.remove('sel');
      cap.innerHTML=`✅ 答对啦！<b>${it.name}</b>${it.zone==='M'?'同时符合两个条件，待在重叠区':'只符合一个条件'}。`;
      sel=null; onPlace();
    } else { z.classList.add('hl'); setTimeout(()=>z.classList.remove('hl'),200); cap.innerHTML='🤔 再想想，这个东西到底符合哪个/哪些条件？'; }
  }));
}
const ITEMS_A=[
  {ico:'🍎',name:'苹果',zone:'M'},{ico:'🍒',name:'樱桃',zone:'M'},
  {ico:'🍋',name:'柠檬',zone:'R'},{ico:'🌶️',name:'红辣椒',zone:'L'},
];
const ITEMS_B=[
  {ico:'🦋',name:'蝴蝶',zone:'M'},{ico:'🐝',name:'蜜蜂',zone:'M'},
  {ico:'🕷️',name:'蜘蛛',zone:'L'},{ico:'🎈',name:'气球',zone:'R'},
];
const boxA=document.getElementById('ex-A'), boxB=document.getElementById('ex-B');
buildVenn(boxA,'🔴 红色的','⭕ 圆形的','rgba(224,59,59,.55)','rgba(90,150,230,.55)', ITEMS_A, ()=>{ doneA++; document.getElementById('cntA').textContent=doneA; unlockGame(); });
buildVenn(boxB,'🦵 有腿的','🕊️ 会飞的','rgba(120,90,60,.55)','rgba(90,190,230,.55)', ITEMS_B, ()=>{ doneB++; document.getElementById('cntB').textContent=doneB; unlockGame(); });

/* ===== 闯关1 拖拽分类 ===== */
const ITEMS=[
 {key:'both',ico:'🍎',name:'苹果(又红又圆)'},{key:'both',ico:'🎈',name:'红气球(又红又圆)'},{key:'both',ico:'🔴',name:'红色圆片'},
 {key:'one',ico:'🟨',name:'黄色圆片(只圆)'},{key:'one',ico:'🟥',name:'红色方块(只红)'},{key:'one',ico:'🍊',name:'橙子(只圆)'},
];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
(function buildSort(){
  const tray=document.getElementById('tray');
  shuffle([...ITEMS]).forEach(it=>{ const d=document.createElement('div'); d.className='item'; d.dataset.k=it.key;
    d.innerHTML=`<div class="itIco">${it.ico}</div><div class="itName">${it.name}</div>`; tray.appendChild(d); });
  let active=null,ox=0,oy=0,placed=0; const total=ITEMS.length; const box=document.getElementById('g-round1');
  const binAt=(x,y)=>[...box.querySelectorAll('.bin')].find(b=>{const r=b.getBoundingClientRect();return x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom;});
  box.querySelectorAll('.item').forEach(el=>el.addEventListener('pointerdown',e=>{ if(el.dataset.done)return;
    active=el; const r=el.getBoundingClientRect(); ox=e.clientX-r.left; oy=e.clientY-r.top;
    el.style.width=r.width+'px'; el.style.height=r.height+'px'; document.body.appendChild(el);
    el.style.position='fixed'; el.style.zIndex=999; el.classList.add('dragging'); mv(e.clientX,e.clientY); e.preventDefault(); }));
  function mv(x,y){ if(!active)return; active.style.left=(x-ox)+'px'; active.style.top=(y-oy)+'px';
    box.querySelectorAll('.bin').forEach(b=>b.classList.remove('over')); const b=binAt(x,y); if(b)b.classList.add('over'); }
  addEventListener('pointermove',e=>{if(active)mv(e.clientX,e.clientY);});
  addEventListener('pointerup',e=>{ if(!active)return; const el=active; active=null;
    box.querySelectorAll('.bin').forEach(b=>b.classList.remove('over')); const bin=binAt(e.clientX,e.clientY);
    const rst=()=>{el.classList.remove('dragging');['position','left','top','width','height','zIndex'].forEach(p=>el.style[p]='');};
    if(bin&&bin.dataset.k===el.dataset.k){ el.dataset.done='1'; rst(); el.classList.add('placed'); bin.querySelector('.binDrop').appendChild(el); placed++;
      if(placed===total) document.getElementById('r1next').style.display='block'; }
    else { rst(); document.getElementById('tray').appendChild(el); el.animate([{transform:'translateX(-8px)'},{transform:'translateX(8px)'},{transform:'translateX(0)'}],{duration:260}); } });
})();

/* ===== 闯关2 判断 ===== */
const QUIZ=[
 {tag:'logic',tl:'逻辑',ico:'🍎',q:'苹果又红又圆，它属于？',opts:[['两个圈都属于(重叠部分)',1],['只属于红色圈',0],['只属于圆形圈',0]],fb:'同时符合两个条件，就待在重叠的地方。'},
 {tag:'logic',tl:'逻辑',ico:'🍋',q:'柠檬是圆的，但不是红色，它属于？',opts:[['只属于圆形这个圈',1],['只属于红色这个圈',0],['两个圈都属于',0]],fb:'只符合一个条件，就只待在那一个圈里。'},
 {tag:'logic',tl:'逻辑',ico:'🟣',q:'像苹果这样，同时符合两个条件的重叠部分，数学上叫做两个圈的？',opts:[['交集',1],['差不多',0],['没有名字',0]],fb:'两个圈重叠、都符合的部分，叫「交集」。'},
 {tag:'en',tl:'英语',ico:'🔤',q:'英语角："方形"用英语怎么说？',opts:[['square',1],['circle',0],['triangle',0]],fb:'square 方形，circle 圆形，triangle 三角形。'},
];
let qi=0; function startQuiz(){ document.getElementById('g-round1').classList.remove('on'); document.getElementById('g-quiz').classList.add('on'); document.getElementById('gameTitle').innerHTML='🎮 第 2 关 · 想一想<small>逻辑 + 英语</small>'; qi=0; renderQ(); }
function renderQ(){ const it=QUIZ[qi]; qprog.textContent=`第 ${qi+1} / ${QUIZ.length} 题`; const tag=document.getElementById('qtag'); tag.className='qtag '+it.tag; tag.textContent=it.tl; qico.textContent=it.ico; qtext.textContent=it.q; qopts.innerHTML=''; qfb.textContent=''; shuffle(it.opts.slice()).forEach(([l,ok])=>{const b=document.createElement('div');b.className='qopt';b.textContent=l;b.onclick=()=>ans(b,ok,it.fb);qopts.appendChild(b);}); }
function ans(el,ok,fb){ if(ok){ el.classList.add('right'); qopts.querySelectorAll('.qopt').forEach(o=>o.style.pointerEvents='none'); qfb.style.color='#2ba36a'; qfb.innerHTML='✅ '+fb; setTimeout(()=>{ qi++; if(qi<QUIZ.length) renderQ(); else go('finish'); },1500);} else { el.classList.add('wrong'); el.style.pointerEvents='none'; qfb.style.color='#e06060'; qfb.textContent='再想想～'; } }

function saveBadge(id,emoji,name){ try{ const k='kidspark_v1'; const d=JSON.parse(localStorage.getItem(k)||'{"badges":{},"days":[]}'); d.badges[id]={emoji,name,date:new Date().toISOString().slice(0,10)}; const t=new Date().toISOString().slice(0,10); if(!d.days.includes(t))d.days.push(t); localStorage.setItem(k,JSON.stringify(d)); }catch(e){} }
function celebrate(){ saveBadge('venn','🟣','交集小专家'); const c=document.getElementById('confetti'), x=c.getContext('2d'); c.width=innerWidth; c.height=innerHeight; const cols=['#7a4fd6','#ffd36b','#3aa7ff','#41c98a','#e0327a','#ff8ac0']; const bits=Array.from({length:120},()=>({x:Math.random()*c.width,y:-20-Math.random()*c.height,s:6+Math.random()*8,vy:2+Math.random()*4,vx:(Math.random()-.5)*2,col:cols[Math.random()*cols.length|0],rot:Math.random()*7,vr:(Math.random()-.5)*.3}));
  let f=0;(function a(){ x.clearRect(0,0,c.width,c.height); f++; bits.forEach(b=>{b.y+=b.vy;b.x+=b.vx;b.rot+=b.vr;x.save();x.translate(b.x,b.y);x.rotate(b.rot);x.fillStyle=b.col;x.fillRect(-b.s/2,-b.s/2,b.s,b.s);x.restore();}); if(f<220)requestAnimationFrame(a);else x.clearRect(0,0,c.width,c.height);})(); }
if(location.hash){const h=location.hash.slice(1); if(h==='tabB'){go('explore');switchEx('B');} else if(h==='quiz'){go('game');startQuiz();} else if(SCENES.includes(h))go(h);}

/* ===== 掌握模式 v1 ===== */
/* 答错必讲解+锁读秒;答对手动翻页;错题末尾重考到会。覆盖上面的 ans()。 */
var _mzRetry=[], _mzFirst={}, _mzR2=0, _mzLock=0;
function _mzOpts(){ return document.querySelectorAll('#qopts .qopt'); }
function _mzSetLock(on){ _mzOpts().forEach(function(o){ if(!o.dataset.dead) o.style.pointerEvents = on?'none':''; }); }
function _mzBtn(txt,cb){
  var f=document.getElementById('qfb');
  var b=document.createElement('button');
  b.textContent=txt;
  b.style.cssText='display:block;margin:14px auto 2px;border:none;border-radius:14px;padding:11px 26px;font-size:16px;font-weight:900;color:#fff;cursor:pointer;background:var(--accent,var(--acc,#2b7de9));';
  b.onclick=cb; f.appendChild(b);
}
function _mzStarNote(){
  if(typeof stars!=='undefined') return;  /* 挑战课自带星级,不重复插 */
  var n=QUIZ.length, got=0; for(var k in _mzFirst){ if(_mzFirst[k]) got++; }
  var card=document.querySelector('.finishCard'); if(!card) return;
  if(card.querySelector('._mzStar')) return;
  var d=document.createElement('div'); d.className='_mzStar';
  d.style.cssText='margin:2px 0 12px;font-weight:900;font-size:15px;line-height:1.6;';
  if(got>=n){ d.style.color='#e8a51b'; d.innerHTML='⭐⭐⭐ 满星通关！'+n+' 题全部<b>一次就答对</b>，是真的懂了！'; }
  else { d.style.color='#8a8f98'; d.innerHTML='⭐ 一次答对 <b>'+got+'/'+n+'</b> 题<br><span style="font-size:13px;font-weight:700">有 '+(n-got)+' 题是重做才对的，下次争取一遍过～</span>'; }
  var h=card.querySelector('h2'); if(h) h.insertAdjacentElement('afterend',d); else card.prepend(d);
}
function _mzFin(){ _mzStarNote(); if(typeof finish==='function') finish(); else go('finish'); }
function _mzMark(){ var p=document.getElementById('qprog'); if(p) p.textContent='🔁 错题重考 · 还剩 '+_mzRetry.length+' 题'; }
function _mzRetryCard(){
  var ico=document.getElementById('qico'), tx=document.getElementById('qtext');
  if(ico) ico.textContent='🔁';
  if(tx) tx.innerHTML='刚才有 <b>'+_mzRetry.length+'</b> 题答错了。<br>再考一遍，真会了才算过！';
  document.getElementById('qopts').innerHTML='';
  var p=document.getElementById('qprog'); if(p) p.textContent='错题重考';
  var f=document.getElementById('qfb'); f.style.color='#8a8f98'; f.innerHTML='';
  _mzBtn('好，再来一遍 ▶', function(){ qi=_mzRetry[0]; renderQ(); _mzMark(); });
}
function _mzAdvance(){
  if(!_mzR2){
    qi++;
    if(qi<QUIZ.length){ renderQ(); return; }
    if(_mzRetry.length){ _mzR2=1; _mzRetryCard(); return; }
    _mzFin(); return;
  }
  _mzRetry.shift();
  if(_mzRetry.length){ qi=_mzRetry[0]; renderQ(); _mzMark(); return; }
  _mzFin();
}
function ans(el,ok,fb){
  if(_mzLock) return;
  var f=document.getElementById('qfb'), idx=qi;
  if(!ok){
    if(_mzFirst[idx]===undefined) _mzFirst[idx]=0;
    if(!_mzR2 && _mzRetry.indexOf(idx)<0) _mzRetry.push(idx);
    el.classList.add('wrong'); el.dataset.dead='1'; el.style.pointerEvents='none'; el.style.opacity='.4';
    _mzLock=1; _mzSetLock(true);
    f.style.color='#e06060';
    f.innerHTML='❌ 不对哦～<br><span style="color:#4a5058;font-weight:700">💡 '+fb+'</span><br><span class="_mzTick" style="color:#9aa0a8;font-size:13px;font-weight:700">读一读上面这句，<b>3</b> 秒后再选一次…</span>';
    var n=3, t=setInterval(function(){
      n--; var tk=document.querySelector('._mzTick');
      if(n>0){ if(tk) tk.innerHTML='读一读上面这句，<b>'+n+'</b> 秒后再选一次…'; return; }
      clearInterval(t); _mzLock=0; _mzSetLock(false);
      if(tk) tk.innerHTML='👆 现在再选一次';
    },1000);
    return;
  }
  if(_mzFirst[idx]===undefined){ _mzFirst[idx]=1; if(typeof stars!=='undefined') stars++; }
  el.classList.add('right'); _mzSetLock(true);
  f.style.color='#2ba36a'; f.innerHTML='✅ '+fb;
  var last = _mzR2 ? (_mzRetry.length<=1) : (qi>=QUIZ.length-1 && !_mzRetry.length);
  _mzBtn(last?'我懂了，完成 ▶':'我懂了，下一题 ▶', _mzAdvance);
}


/* ===== 开场读秒 v1 ===== */
(function(){
  var sec = document.getElementById('s-intro');
  var btn = sec && sec.querySelector('.bigbtn');
  if(!btn) return;
  var card = sec.querySelector('.introCard');
  var len = card ? (card.innerText||'').replace(/\s/g,'').length : 60;
  var n = Math.max(3, Math.min(6, Math.round(len/18)));   /* 3~6 秒,按开场文字长短 */
  var orig = btn.textContent, css = btn.style.cssText;
  btn.disabled = true; btn.style.opacity = '.4'; btn.style.cursor = 'default';
  var tip = document.createElement('div');
  tip.style.cssText = 'margin:10px auto 0;color:#9aa0a8;font-size:14px;font-weight:800;';
  tip.innerHTML = '👀 先读一读上面这段…';
  btn.insertAdjacentElement('afterend', tip);
  btn.textContent = orig + '（' + n + '）';
  var t = setInterval(function(){
    n--;
    if(n>0){ btn.textContent = orig + '（' + n + '）'; return; }
    clearInterval(t);
    btn.disabled = false; btn.style.cssText = css; btn.textContent = orig;
    tip.remove();
  },1000);
})();

</script>
